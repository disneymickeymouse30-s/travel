<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Journey">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" id="meta-theme-color" content="#FFF9F9">

  <title>旅のしおり（Journey OS）</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Map for ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --app-bg: #FFF9F9;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.6);
    }
    body {
      background-color: var(--app-bg);
      font-family: 'Hiragino Maru Gothic ProN', 'Arial Rounded MT Bold', 'Rounded M+ 1c', -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      color: #44403c;
      transition: background-color 0.5s ease;
    }
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @media print {
      body { background-color: white; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      .page-break { page-break-before: always; }
      .print-card { box-shadow: none !important; border: 1px solid #ddd; break-inside: avoid; }
      #root { padding: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Home, FileText, Copy, Plus, Settings, Calendar, MapPin, Users,
      Briefcase, DollarSign, Share, Download, Upload, ChevronRight,
      ChevronDown, Trash2, Clock, Image as ImageIcon, Link as LinkIcon,
      AlignLeft, ArrowUp, ArrowDown, Wand2, MoreHorizontal,
      CheckCircle2, Circle, Sun, Cloud, ChevronLeft, X, Camera, Palette,
      Globe, Tag
    } from 'lucide-react';

    // --- Configs & Themes ---
    const colorClasses = {
      pink: { text: 'text-pink-500', bgLight: 'bg-pink-50/70', bgMedium: 'bg-pink-100', bgMain: 'bg-pink-400', bgHover: 'hover:bg-pink-500', borderLight: 'border-pink-100', borderMain: 'border-pink-400', ring: 'focus-within:border-pink-300 focus-within:ring-pink-100 focus:border-pink-300 focus:ring-pink-100', shadow: 'shadow-pink-200', shadowLight: 'shadow-pink-100', gradient: 'from-pink-300 via-rose-300 to-orange-200' },
      emerald: { text: 'text-emerald-500', bgLight: 'bg-emerald-50/70', bgMedium: 'bg-emerald-100', bgMain: 'bg-emerald-400', bgHover: 'hover:bg-emerald-500', borderLight: 'border-emerald-100', borderMain: 'border-emerald-400', ring: 'focus-within:border-emerald-300 focus-within:ring-emerald-100 focus:border-emerald-300 focus:ring-emerald-100', shadow: 'shadow-emerald-200', shadowLight: 'shadow-emerald-100', gradient: 'from-emerald-300 via-teal-300 to-cyan-200' },
      sky: { text: 'text-sky-500', bgLight: 'bg-sky-50/70', bgMedium: 'bg-sky-100', bgMain: 'bg-sky-400', bgHover: 'hover:bg-sky-500', borderLight: 'border-sky-100', borderMain: 'border-sky-400', ring: 'focus-within:border-sky-300 focus-within:ring-sky-100 focus:border-sky-300 focus:ring-sky-100', shadow: 'shadow-sky-200', shadowLight: 'shadow-sky-100', gradient: 'from-sky-300 via-blue-300 to-indigo-200' },
      purple: { text: 'text-purple-500', bgLight: 'bg-purple-50/70', bgMedium: 'bg-purple-100', bgMain: 'bg-purple-400', bgHover: 'hover:bg-purple-500', borderLight: 'border-purple-100', borderMain: 'border-purple-400', ring: 'focus-within:border-purple-300 focus-within:ring-purple-100 focus:border-purple-300 focus:ring-purple-100', shadow: 'shadow-purple-200', shadowLight: 'shadow-purple-100', gradient: 'from-purple-300 via-fuchsia-300 to-pink-200' },
      amber: { text: 'text-amber-500', bgLight: 'bg-amber-50/70', bgMedium: 'bg-amber-100', bgMain: 'bg-amber-400', bgHover: 'hover:bg-amber-500', borderLight: 'border-amber-100', borderMain: 'border-amber-400', ring: 'focus-within:border-amber-300 focus-within:ring-amber-100 focus:border-amber-300 focus:ring-amber-100', shadow: 'shadow-amber-200', shadowLight: 'shadow-amber-100', gradient: 'from-amber-200 via-yellow-300 to-orange-200' },
      orange: { text: 'text-orange-500', bgLight: 'bg-orange-50/70', bgMedium: 'bg-orange-100', bgMain: 'bg-orange-400', borderLight: 'border-orange-100', borderMain: 'border-orange-400', ring: 'focus-within:border-orange-300 focus-within:ring-orange-100 focus:border-orange-300 focus:ring-orange-100', shadowLight: 'shadow-orange-100' },
      yellow: { text: 'text-yellow-500', bgLight: 'bg-yellow-50/70', bgMedium: 'bg-yellow-100', bgMain: 'bg-yellow-400', borderLight: 'border-yellow-100', borderMain: 'border-yellow-400', ring: 'focus-within:border-yellow-300 focus-within:ring-yellow-100 focus:border-yellow-300 focus:ring-yellow-100', shadowLight: 'shadow-yellow-100' },
      teal: { text: 'text-teal-500', bgLight: 'bg-teal-50/70', bgMedium: 'bg-teal-100', bgMain: 'bg-teal-400', borderLight: 'border-teal-100', borderMain: 'border-teal-400', ring: 'focus-within:border-teal-300 focus-within:ring-teal-100 focus:border-teal-300 focus:ring-teal-100', shadowLight: 'shadow-teal-100' },
      lime: { text: 'text-lime-500', bgLight: 'bg-lime-50/70', bgMedium: 'bg-lime-100', bgMain: 'bg-lime-400', borderLight: 'border-lime-100', borderMain: 'border-lime-400', ring: 'focus-within:border-lime-300 focus-within:ring-lime-100 focus:border-lime-300 focus:ring-lime-100', shadowLight: 'shadow-lime-100' },
      cyan: { text: 'text-cyan-500', bgLight: 'bg-cyan-50/70', bgMedium: 'bg-cyan-100', bgMain: 'bg-cyan-400', borderLight: 'border-cyan-100', borderMain: 'border-cyan-400', ring: 'focus-within:border-cyan-300 focus-within:ring-cyan-100 focus:border-cyan-300 focus:ring-cyan-100', shadowLight: 'shadow-cyan-100' },
      blue: { text: 'text-blue-500', bgLight: 'bg-blue-50/70', bgMedium: 'bg-blue-100', bgMain: 'bg-blue-400', borderLight: 'border-blue-100', borderMain: 'border-blue-400', ring: 'focus-within:border-blue-300 focus-within:ring-blue-100 focus:border-blue-300 focus:ring-blue-100', shadowLight: 'shadow-blue-100' },
      indigo: { text: 'text-indigo-500', bgLight: 'bg-indigo-50/70', bgMedium: 'bg-indigo-100', bgMain: 'bg-indigo-400', borderLight: 'border-indigo-100', borderMain: 'border-indigo-400', ring: 'focus-within:border-indigo-300 focus-within:ring-indigo-100 focus:border-indigo-300 focus:ring-indigo-100', shadowLight: 'shadow-indigo-100' },
      violet: { text: 'text-violet-500', bgLight: 'bg-violet-50/70', bgMedium: 'bg-violet-100', bgMain: 'bg-violet-400', borderLight: 'border-violet-100', borderMain: 'border-violet-400', ring: 'focus-within:border-violet-300 focus-within:ring-violet-100 focus:border-violet-300 focus:ring-violet-100', shadowLight: 'shadow-violet-100' },
      fuchsia: { text: 'text-fuchsia-500', bgLight: 'bg-fuchsia-50/70', bgMedium: 'bg-fuchsia-100', bgMain: 'bg-fuchsia-400', borderLight: 'border-fuchsia-100', borderMain: 'border-fuchsia-400', ring: 'focus-within:border-fuchsia-300 focus-within:ring-fuchsia-100 focus:border-fuchsia-300 focus:ring-fuchsia-100', shadowLight: 'shadow-fuchsia-100' },
      rose: { text: 'text-rose-500', bgLight: 'bg-rose-50/70', bgMedium: 'bg-rose-100', bgMain: 'bg-rose-400', borderLight: 'border-rose-100', borderMain: 'border-rose-400', ring: 'focus-within:border-rose-300 focus-within:ring-rose-100 focus:border-rose-300 focus:ring-rose-100', shadowLight: 'shadow-rose-100' }
    };

    const THEMES = {
      sakura: {
        id: 'sakura', name: 'サクラ', bgHex: '#FFF9F9', primary: 'pink',
        sections: { info: 'orange', memo: 'yellow', schedule: 'sky', items: 'emerald', budget: 'purple' }
      },
      mint: {
        id: 'mint', name: 'ミント', bgHex: '#F2FCF7', primary: 'emerald',
        sections: { info: 'teal', memo: 'lime', schedule: 'cyan', items: 'sky', budget: 'indigo' }
      },
      sky: {
        id: 'sky', name: 'スカイ', bgHex: '#F2F8FF', primary: 'sky',
        sections: { info: 'blue', memo: 'indigo', schedule: 'violet', items: 'fuchsia', budget: 'pink' }
      },
      lavender: {
        id: 'lavender', name: 'ラベンダー', bgHex: '#F9F5FF', primary: 'purple',
        sections: { info: 'fuchsia', memo: 'pink', schedule: 'rose', items: 'orange', budget: 'amber' }
      },
      lemon: {
        id: 'lemon', name: 'レモン', bgHex: '#FFFCF0', primary: 'amber',
        sections: { info: 'orange', memo: 'amber', schedule: 'yellow', items: 'lime', budget: 'emerald' }
      }
    };

    // --- Utils ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const formatDate = (dateString) => {
      if (!dateString) return '';
      const options = { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' };
      return new Date(dateString).toLocaleDateString('ja-JP', options);
    };
    const calculateDays = (start, end) => {
      if (!start || !end) return 0;
      const diffTime = Math.abs(new Date(end) - new Date(start));
      return Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
    };
    const timeToMinutes = (timeStr) => {
      if (!timeStr) return 0;
      const [h, m] = timeStr.split(':').map(Number);
      return h * 60 + (m || 0);
    };

    const compressImage = (file, maxWidth = 800, quality = 0.7) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = (error) => reject(error);
        };
        reader.onerror = (error) => reject(error);
      });
    };

    // --- Mock Data ---
    const todayStr = new Date().toISOString().split('T')[0];
    const initialTemplate = {
      id: 'template-okinawa',
      title: '🌺 沖縄リゾート満喫プラン',
      subtitle: '海とグルメとリラックス',
      startDate: todayStr,
      endDate: todayStr,
      destination: '沖縄県',
      members: ['自分', '友人A', '友人B'],
      memo: '・レンタカーの免許証を忘れないこと\n・日焼け止め必須',
      coverImage: '',
      items: [
        { id: 'i1', name: '水着・ラッシュガード', checked: false },
        { id: 'i2', name: 'サングラス', checked: false },
        { id: 'i3', name: 'モバイルバッテリー', checked: false },
      ],
      budgets: [
        { id: 'b1', name: '航空券', amount: 35000 },
        { id: 'b2', name: 'ホテル代', amount: 20000 },
        { id: 'b3', name: 'レンタカー', amount: 8000 },
      ],
      schedules: {
        1: [
          { id: 's1', time: '10:00', content: '那覇空港 到着', location: '那覇空港', mapLink: '', infoLink: '', infoLinkLabel: '', memo: 'レンタカー送迎バスへ', images: [] },
          { id: 's2', time: '12:00', content: 'ウミカジテラスでランチ', location: '瀬長島ウミカジテラス', mapLink: 'https://maps.app.goo.gl/xxx', infoLink: 'https://www.umikajiterrace.com/', infoLinkLabel: '公式サイト', memo: 'タコライスを食べる', images: [] },
          { id: 's3', time: '15:00', content: 'ホテルチェックイン', location: '恩納村リゾートホテル', mapLink: '', infoLink: '', infoLinkLabel: '', memo: 'オーシャンビューの部屋', images: [] },
          { id: 's4', time: '19:00', content: '国際通りでディナー', location: '国際通り', mapLink: '', infoLink: 'https://example.com/reserve', infoLinkLabel: '予約画面', memo: '沖縄料理の居酒屋', images: [] },
        ]
      },
      isTemplate: true,
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };

    const getEmptyTrip = () => ({
      id: generateId(), title: '', subtitle: '', startDate: '', endDate: '', destination: '', members: [], memo: '', coverImage: '', items: [], budgets: [], schedules: { 1: [] }, isTemplate: false, createdAt: Date.now(), updatedAt: Date.now()
    });

    // --- Components ---
    const GlassCard = ({ children, className = '', onClick }) => (
      <div className={`glass-panel rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.03)] overflow-hidden transition-all duration-300 ${onClick ? 'cursor-pointer active:scale-[0.98] hover:shadow-[0_8px_30px_rgb(0,0,0,0.06)]' : ''} ${className}`} onClick={onClick}>
        {children}
      </div>
    );

    const Accordion = ({ title, icon: Icon, themeColorName = 'pink', defaultOpen = false, children, rightAction }) => {
      const [isOpen, setIsOpen] = useState(defaultOpen);
      const c = colorClasses[themeColorName];
      return (
        <div className={`bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.03)] mb-4 border ${c.borderLight} overflow-hidden no-print`}>
          <div className="flex items-center justify-between p-5 cursor-pointer select-none hover:bg-stone-50/30 transition-colors" onClick={() => setIsOpen(!isOpen)}>
            <div className="flex items-center space-x-4">
              <div className={`p-2.5 ${c.bgLight} ${c.text} rounded-2xl`}>
                <Icon size={22} />
              </div>
              <h3 className="font-bold text-stone-700 text-lg">{title}</h3>
            </div>
            <div className="flex items-center space-x-2">
              {rightAction && <div onClick={(e) => e.stopPropagation()}>{rightAction}</div>}
              <ChevronDown size={22} className={`text-stone-300 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} />
            </div>
          </div>
          <div className={`transition-all duration-300 ease-in-out ${isOpen ? 'max-h-[2000px] opacity-100' : 'max-h-0 opacity-0'}`}>
            <div className={`p-5 pt-0 border-t ${c.borderLight}`}>
              {children}
            </div>
          </div>
        </div>
      );
    };

    // --- Views ---
    const HomeView = ({ activeTrips, handleCreate, setCurrentTripId, setView, currentTheme }) => {
      const cMain = colorClasses[currentTheme.primary];
      return (
        <div className="pb-24 pt-8 px-4 max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div className="flex justify-between items-end mb-8 pl-2">
            <div>
              <h1 className="text-3xl font-extrabold tracking-tight text-stone-700">旅のしおり</h1>
              <p className="text-stone-400 mt-1 font-medium">Journey OS</p>
            </div>
            <button onClick={() => handleCreate()} className={`${cMain.bgMain} text-white p-3.5 rounded-full shadow-lg ${cMain.shadow} active:scale-95 transition-transform ${cMain.bgHover}`}>
              <Plus size={24} />
            </button>
          </div>

          {activeTrips.length === 0 ? (
            <div className="text-center py-20 bg-white rounded-3xl border border-stone-100 shadow-[0_8px_30px_rgb(0,0,0,0.03)]">
              <div className={`${cMain.bgLight} w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4`}>
                <MapPin size={32} className={cMain.text} />
              </div>
              <h3 className="text-lg font-bold text-stone-700">予定がありません</h3>
              <p className="text-stone-400 mt-2 mb-6 font-medium">新しい旅の計画を始めましょう</p>
              <button onClick={() => handleCreate()} className={`${cMain.bgMain} ${cMain.bgHover} text-white px-7 py-3.5 rounded-2xl font-bold active:scale-95 transition-all shadow-md ${cMain.shadow}`}>
                新規作成
              </button>
            </div>
          ) : (
            <div className="space-y-4">
              {activeTrips.map(trip => {
                const daysToTrip = trip.startDate ? Math.ceil((new Date(trip.startDate) - new Date()) / (1000 * 60 * 60 * 24)) : null;
                return (
                  <GlassCard key={trip.id} className="p-5 relative group bg-white border border-stone-100/50" onClick={() => { setCurrentTripId(trip.id); setView('view'); }}>
                    <div className="absolute top-4 right-4 flex space-x-2 z-10">
                      <button onClick={(e) => { e.stopPropagation(); setCurrentTripId(trip.id); setView('edit'); }} className={`p-2.5 bg-white/90 backdrop-blur rounded-full text-stone-400 ${cMain.text} shadow-sm transition-colors hover:bg-stone-50`}>
                        <MoreHorizontal size={18} />
                      </button>
                    </div>
                    <div className="flex items-start space-x-4">
                      <div className={`w-16 h-16 rounded-2xl bg-gradient-to-br ${cMain.gradient} flex items-center justify-center flex-shrink-0 text-2xl shadow-inner overflow-hidden border border-white/50`}>
                        {trip.coverImage ? <img src={trip.coverImage} alt="Cover" className="w-full h-full object-cover" /> : <span>✈️</span>}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center space-x-2 mb-1">
                          {daysToTrip !== null && daysToTrip > 0 && daysToTrip <= 30 && (
                            <span className="bg-orange-50 text-orange-500 text-xs font-bold px-2.5 py-1 rounded-lg border border-orange-100">あと {daysToTrip} 日</span>
                          )}
                          {daysToTrip !== null && daysToTrip < 0 && (
                            <span className="bg-stone-100 text-stone-400 text-xs font-bold px-2.5 py-1 rounded-lg">終了</span>
                          )}
                        </div>
                        <h2 className="text-xl font-extrabold text-stone-700 line-clamp-2 mb-1 leading-snug">{trip.title || '無題の旅行'}</h2>
                        {trip.destination && <p className="text-stone-400 text-sm flex items-center font-medium"><MapPin size={14} className="mr-1 inline text-stone-300" />{trip.destination}</p>}
                        <p className="text-stone-400 text-sm mt-1 flex items-center font-medium"><Calendar size={14} className="mr-1 inline text-stone-300" />{trip.startDate ? formatDate(trip.startDate) : '日程未定'}</p>
                      </div>
                    </div>
                  </GlassCard>
                )
              })}
            </div>
          )}
        </div>
      );
    };

    const TemplatesView = ({ templates, handleCreate, handleDelete, currentTheme }) => {
      const cMain = colorClasses[currentTheme.primary];
      return (
        <div className="pb-24 pt-8 px-4 max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
           <div className="pl-2 mb-8">
            <h1 className="text-3xl font-extrabold tracking-tight text-stone-700">テンプレート</h1>
            <p className="text-stone-400 mt-1 font-medium">過去のプランを再利用</p>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {templates.map(template => (
              <GlassCard key={template.id} className="p-5 flex flex-col h-full border border-stone-100 bg-white">
                <div className="flex-1">
                  <h3 className="font-extrabold text-lg text-stone-700 mb-2 line-clamp-2 leading-snug">{template.title}</h3>
                  <p className="text-sm text-stone-400 mb-4 line-clamp-2 font-medium">{template.subtitle || '説明なし'}</p>
                  <div className="flex flex-wrap gap-2 mb-4">
                    <span className="text-xs bg-stone-50 text-stone-500 px-2.5 py-1.5 rounded-lg border border-stone-100 font-bold">持ち物 {template.items?.length || 0}</span>
                    <span className="text-xs bg-stone-50 text-stone-500 px-2.5 py-1.5 rounded-lg border border-stone-100 font-bold">予定 {Object.values(template.schedules).flat().length}</span>
                  </div>
                </div>
                <div className="flex space-x-2 mt-auto">
                  <button onClick={() => handleCreate(template)} className={`flex-1 ${cMain.bgLight} ${cMain.text} py-2.5 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-transform ${cMain.bgMedium}`}>
                    <Copy size={16} className="mr-2" />この構成で作る
                  </button>
                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleDelete(template.id); }} className="p-2.5 bg-rose-50 text-rose-400 rounded-xl active:scale-95 transition-transform hover:bg-rose-100">
                    <Trash2 size={16} />
                  </button>
                </div>
              </GlassCard>
            ))}
          </div>
        </div>
      );
    };

    const TripEditor = ({ currentTrip, updateCurrentTrip, handleDelete, setView, currentTheme, showAlert }) => {
      if (!currentTrip) return null;
      const daysCount = calculateDays(currentTrip.startDate, currentTrip.endDate) || 1;
      const [activeDay, setActiveDay] = useState(1);
      
      const titleRef = useRef(null);
      const subtitleRef = useRef(null);
      
      const cMain = colorClasses[currentTheme.primary];
      const cInfo = colorClasses[currentTheme.sections.info];
      const cMemo = colorClasses[currentTheme.sections.memo];
      const cSched = colorClasses[currentTheme.sections.schedule];
      const cItem = colorClasses[currentTheme.sections.items];
      const cBudget = colorClasses[currentTheme.sections.budget];

      const updateItems = (newItems) => updateCurrentTrip({ items: newItems });
      const updateBudgets = (newBudgets) => updateCurrentTrip({ budgets: newBudgets });
      const updateSchedules = (newSchedules) => updateCurrentTrip({ schedules: newSchedules });
      
      const handleAddSchedule = (day) => {
        const daySchedules = currentTrip.schedules[day] || [];
        updateSchedules({ ...currentTrip.schedules, [day]: [...daySchedules, { id: generateId(), time: '10:00', content: '', location: '', mapLink: '', infoLink: '', infoLinkLabel: '', memo: '', images: [] }] });
      };

      const moveSchedule = (day, index, direction) => {
        const list = [...(currentTrip.schedules[day] || [])];
        if (direction === 'up' && index > 0) {
          [list[index - 1], list[index]] = [list[index], list[index - 1]];
        } else if (direction === 'down' && index < list.length - 1) {

    const TripViewer = ({ currentTrip, setView, setCurrentTripId, handleSaveAsTemplate, updateCurrentTrip, currentTheme }) => {
      const [currentTime, setCurrentTime] = useState(new Date());
      const [dogPositions, setDogPositions] = useState({});
      const [viewerData, setViewerData] = useState({ isOpen: false, images: [], currentIndex: 0 });
      const touchStartX = useRef(null);
      const touchEndX = useRef(null);
      
      const cMain = colorClasses[currentTheme.primary];
      const cInfo = colorClasses[currentTheme.sections.info];
      const cMemo = colorClasses[currentTheme.sections.memo];
      const cSched = colorClasses[currentTheme.sections.schedule];
      const cItem = colorClasses[currentTheme.sections.items];
      const cBudget = colorClasses[currentTheme.sections.budget];

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      if (!currentTrip) return null;
      const daysCount = calculateDays(currentTrip.startDate, currentTrip.endDate) || 1;
      const totalBudget = currentTrip.budgets.reduce((sum, b) => sum + (Number(b.amount) || 0), 0);

      const currentDayIndex = useMemo(() => {
        if (!currentTrip?.startDate) return null;
        const start = new Date(currentTrip.startDate); start.setHours(0, 0, 0, 0);
        const today = new Date(currentTime); today.setHours(0, 0, 0, 0);
        return Math.floor((today.getTime() - start.getTime()) / (1000 * 60 * 60 * 24)) + 1;
      }, [currentTrip?.startDate, currentTime]);

      const currentMinutes = currentTime.getHours() * 60 + currentTime.getMinutes() + currentTime.getSeconds() / 60;

      useEffect(() => {
        if (!currentTrip) return;
        const newPositions = {};
        Object.keys(currentTrip.schedules).forEach(dayStr => {
          if (currentDayIndex === parseInt(dayStr)) {
            const schedules = currentTrip.schedules[dayStr] || [];
            if (schedules.length === 0) return;
            const container = document.getElementById(`timeline-${dayStr}`);
            if (!container) return;
            const sorted = [...schedules].sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));
            const firstTime = timeToMinutes(sorted[0].time);
            const lastTime = timeToMinutes(sorted[sorted.length - 1].time);
            const getDotCenterY = (id) => {
              const el = document.getElementById(`dot-${id}`);
              if (el) return (el.getBoundingClientRect().top - container.getBoundingClientRect().top) + (el.getBoundingClientRect().height / 2);
              return 0;
            };
            if (sorted.length === 1 || currentMinutes <= firstTime) newPositions[dayStr] = getDotCenterY(sorted[0].id);
            else if (currentMinutes >= lastTime) newPositions[dayStr] = getDotCenterY(sorted[sorted.length - 1].id);
            else {
              for (let j = 0; j < sorted.length - 1; j++) {
                const t1 = timeToMinutes(sorted[j].time); const t2 = timeToMinutes(sorted[j + 1].time);
                if (currentMinutes >= t1 && currentMinutes <= t2) {
                  const top1 = getDotCenterY(sorted[j].id); const top2 = getDotCenterY(sorted[j + 1].id);
                  newPositions[dayStr] = top1 + (top2 - top1) * (t2 === t1 ? 0 : (currentMinutes - t1) / (t2 - t1)); break;
                }
              }
            }
          }
        });
        setDogPositions(newPositions);
      }, [currentTime, currentTrip, currentDayIndex, currentMinutes]);

      const onTouchStart = (e) => touchStartX.current = e.targetTouches[0].clientX;
      const onTouchMove = (e) => touchEndX.current = e.targetTouches[0].clientX;
      const onTouchEnd = () => {
        if (!touchStartX.current || !touchEndX.current) return;
        const distance = touchStartX.current - touchEndX.current;
        if (distance > 50 && viewerData.currentIndex < viewerData.images.length - 1) setViewerData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 }));
        if (distance < -50 && viewerData.currentIndex > 0) setViewerData(prev => ({ ...prev, currentIndex: prev.currentIndex - 1 }));
        touchStartX.current = null; touchEndX.current = null;
      };

      return (
        <div className="min-h-screen animate-in fade-in duration-300 pb-24 print:pb-0 relative">
          <div className="sticky top-0 z-40 glass-panel border-b border-stone-200/50 no-print">
            <div className="flex items-center justify-between p-4 max-w-3xl mx-auto">
              <button onClick={() => { setView('home'); setCurrentTripId(null); }} className="text-stone-600 flex items-center font-bold bg-white px-4 py-2 rounded-full hover:bg-stone-50 transition-colors shadow-sm border border-stone-100">
                <ChevronLeft size={18} className="mr-1" /> 戻る
              </button>
              <div className="flex space-x-2">
                <button onClick={() => setView('edit')} className={`text-white ${cMain.bgMain} ${cMain.bgHover} px-5 py-2 rounded-full font-bold transition-colors shadow-md ${cMain.shadowLight}`}>
                  編集
                </button>
                <button onClick={() => handleSaveAsTemplate(currentTrip)} className="text-stone-600 bg-white p-2.5 rounded-full hover:bg-stone-50 shadow-sm border border-stone-100" title="テンプレートとして保存"><Copy size={18} /></button>
              </div>
            </div>
          </div>

          <div className="max-w-3xl mx-auto px-0 py-8 print:py-0 print:px-0 w-full overflow-hidden">
            <div className="mb-10 px-6 print:mt-8">
              <div className="text-center">
                <h1 className="text-4xl font-black text-stone-700 tracking-tight mb-3 leading-tight whitespace-pre-wrap">{currentTrip.title || '無題の旅行'}</h1>
                {currentTrip.subtitle && <p className="text-xl text-stone-400 mb-6 font-bold whitespace-pre-wrap">{currentTrip.subtitle}</p>}
              </div>
              
              <div className={`flex flex-col sm:flex-row sm:flex-wrap items-start sm:items-center justify-start gap-3 text-sm font-bold text-stone-600 bg-white print:border-gray-300 rounded-2xl p-4 shadow-[0_8px_30px_rgb(0,0,0,0.02)] border ${cInfo.borderLight} text-left`}>
                {currentTrip.destination && <div className="flex items-center px-2"><MapPin size={16} className={`mr-1.5 flex-shrink-0 ${cInfo.text}`} /> <span>{currentTrip.destination}</span></div>}
                {(currentTrip.startDate || currentTrip.endDate) && <div className="flex items-center px-2"><Calendar size={16} className={`mr-1.5 flex-shrink-0 ${cInfo.text}`} /> <span>{formatDate(currentTrip.startDate)} {currentTrip.endDate && `〜 ${formatDate(currentTrip.endDate)}`}</span></div>}
                {currentTrip.members.length > 0 && <div className="flex items-center px-2"><Users size={16} className={`mr-1.5 flex-shrink-0 ${cInfo.text}`} /> <span>{currentTrip.members.join(', ')}</span></div>}
              </div>
            </div>

            {currentTrip.coverImage && (
              <div className={`w-full mb-10 ${cMain.bgLight} flex justify-center border-y border-stone-100`}>
                <img src={currentTrip.coverImage} alt="Cover" className="w-full max-w-full h-auto object-contain max-h-[60vh] cursor-pointer hover:opacity-90 transition-opacity" onClick={() => setViewerData({ isOpen: true, images: [currentTrip.coverImage], currentIndex: 0 })} />
              </div>
            )}

            <div className="px-4 sm:px-6 w-full max-w-full">
              {currentTrip.memo && (
                 <div className={`mb-12 p-6 ${cMemo.bgLight} rounded-3xl border ${cMemo.borderLight} flex flex-col items-center`}>
                   <h3 className={`text-sm font-black ${cMemo.text} uppercase tracking-widest mb-4 flex items-center justify-center`}><FileText size={18} className="mr-2"/> 全体メモ</h3>
                   <div className="text-stone-700 leading-relaxed font-medium text-base w-full max-w-full">
                     {currentTrip.memo.split('\n').map((line, i) => (
                       <div key={i} className="text-center min-h-[1.5rem] break-words">
                         {line}
                       </div>
                     ))}
                   </div>
                 </div>
              )}

              <div className="mb-12">
                <div className="flex items-center justify-between mb-8 pl-2">
                  <h2 className="text-2xl font-black text-stone-700 flex items-center tracking-tight"><Clock className={`mr-2.5 ${cSched.text}`} size={28} /> 旅のスケジュール</h2>
                </div>
                
                <div className="space-y-12 w-full max-w-full overflow-hidden">
                  {Array.from({ length: daysCount }).map((_, i) => {
                    const dayStr = String(i + 1);
                    const schedules = currentTrip.schedules[dayStr] || [];
                    if (schedules.length === 0) return null;
                    const dateStr = currentTrip.startDate ? formatDate(new Date(new Date(currentTrip.startDate).setDate(new Date(currentTrip.startDate).getDate() + i))) : '';
                    const isToday = currentDayIndex === parseInt(dayStr);

                    return (
                      <div key={dayStr} className="print-card print:mb-6 w-full max-w-full overflow-hidden">
                        <div className="flex items-baseline mb-6 pl-2">
                          <h3 className="text-2xl font-black text-stone-700 mr-3">Day {dayStr}</h3>
                          <span className="text-base font-bold text-stone-400">{dateStr}</span>
                          {isToday && <span className={`ml-4 text-xs ${cSched.bgMain} text-white px-3 py-1.5 rounded-full font-bold animate-pulse shadow-md ${cSched.shadowLight} no-print`}>Today</span>}
                        </div>
                        
                        <div id={`timeline-${dayStr}`} className="relative pb-6 w-full max-w-full overflow-hidden">
                          <div className={`absolute top-2 bottom-0 left-[27px] sm:left-[27px] w-1 ${cSched.bgLight} z-0 rounded-full`}></div>

                          {isToday && dogPositions[dayStr] !== undefined && (
                            <div className="absolute z-20 no-print flex items-center justify-center pointer-events-none transition-all duration-1000 ease-linear" style={{ top: `${dogPositions[dayStr]}px`, left: '11px', transform: 'translateY(-50%)' }}>
                              <div className={`bg-white rounded-full shadow-lg border-2 ${cSched.borderLight} text-xl w-9 h-9 flex items-center justify-center filter drop-shadow-md`}>🐕</div>
                            </div>
                          )}

                          <div className="space-y-8 w-full max-w-full">
                            {schedules.map((item) => {
                              const itemImages = item.images || (item.image ? [item.image] : []);
                              return (
                                <div key={item.id} className="relative z-10 pl-[56px] sm:pl-[72px] w-full max-w-full pr-1">
                                  <div id={`dot-${item.id}`} className={`absolute w-[18px] h-[18px] bg-white border-[4px] ${cSched.borderMain} rounded-full left-[19px] sm:left-[19px] top-[14px] shadow-sm z-10`}></div>
                                  
                                  <div className="flex flex-col sm:flex-row sm:items-start gap-2 sm:gap-5 w-full max-w-full">
                                    <div className="flex flex-col items-start w-16 flex-shrink-0 pt-1">
                                      <span className={`${cSched.text} font-black text-lg tracking-tighter`}>{item.time || '--:--'}</span>
                                    </div>
                                    <div className="flex-1 w-[calc(100%-1rem)] bg-white print:bg-transparent rounded-3xl p-4 sm:p-5 shadow-[0_8px_30px_rgb(0,0,0,0.03)] print:shadow-none border border-stone-100 print:border-none print:p-0 relative overflow-hidden group">
                                      <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${cSched.bgLight}`}></div>
                                      <h4 className="text-xl font-extrabold text-stone-700 mb-3 tracking-tight leading-snug break-words">{item.content || '予定なし'}</h4>
                                      
                                      <div className="flex flex-wrap gap-2 mb-2 w-full">
                                        {item.location && (
                                          <span className={`inline-flex items-center px-3 py-1.5 bg-stone-50 text-stone-600 rounded-xl text-sm font-bold border border-stone-100 break-words max-w-full`}>
                                            <MapPin size={14} className={`mr-1.5 ${cSched.text} flex-shrink-0`} /> <span className="truncate">{item.location}</span>
                                          </span>
                                        )}
                                        {item.mapLink && (
                                          <a href={item.mapLink} target="_blank" rel="noreferrer" className={`inline-flex items-center px-3 py-1.5 bg-blue-50 text-blue-500 rounded-xl text-sm font-bold hover:bg-blue-100 transition-colors border border-blue-100 no-print flex-shrink-0`}>
                                            <LinkIcon size={14} className="mr-1.5 text-blue-400" /> Map
                                          </a>
                                        )}
                                        {item.infoLink && (
                                          <a href={item.infoLink} target="_blank" rel="noreferrer" className={`inline-flex items-center px-3 py-1.5 ${cSched.bgLight} ${cSched.text} rounded-xl text-sm font-bold ${cSched.bgHover} hover:text-white transition-colors border ${cSched.borderLight} no-print max-w-full break-words`}>
                                            <Globe size={14} className="mr-1.5 flex-shrink-0" />
                                            <span className="truncate">{item.infoLinkLabel || '参考リンク'}</span>
                                          </a>
                                        )}
                                      </div>
                                      
                                      {item.memo && (
                                        <div className="mt-4 relative pl-4 py-1 text-sm text-stone-500 whitespace-pre-wrap leading-relaxed font-medium break-words w-full">
                                          <div className={`absolute left-0 top-0 bottom-0 w-1 ${cSched.bgMedium} rounded-full`}></div>
                                          {item.memo}
                                        </div>
                                      )}
                                      
                                      {itemImages.length > 0 && (
                                        <div className="mt-5 flex gap-3 overflow-x-auto hide-scrollbar pb-2 no-print w-full max-w-full">
                                          {itemImages.map((img, imgIndex) => (
                                            <img key={imgIndex} src={img} alt="添付画像" onClick={() => setViewerData({ isOpen: true, images: itemImages, currentIndex: imgIndex })} className="h-32 w-auto max-w-[75vw] sm:max-w-[80vw] rounded-2xl object-contain border border-stone-100 flex-shrink-0 cursor-pointer active:opacity-70 transition-opacity bg-stone-50" />
                                          ))}
                                        </div>
                                      )}
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8 page-break">
                {currentTrip.items.length > 0 && (
                  <div className="print-card p-7 bg-white rounded-3xl border border-stone-100 shadow-[0_8px_30px_rgb(0,0,0,0.03)]">
                    <h2 className="text-xl font-black text-stone-700 border-b-2 border-stone-50 pb-4 mb-5 flex items-center">
                      <Briefcase className={`mr-2.5 ${cItem.text}`} /> 持ち物リスト
                    </h2>
                    <ul className="space-y-3.5">
                      {currentTrip.items.map((item, index) => (
                        <li key={item.id} className="flex items-center text-stone-700 font-bold group cursor-pointer" onClick={() => {
                          const newItems = [...currentTrip.items]; newItems[index].checked = !newItems[index].checked; updateCurrentTrip({ items: newItems });
                        }}>
                          <button className={`w-6 h-6 rounded-md border-[3px] border-stone-200 mr-3 flex items-center justify-center print:border-gray-800 transition-colors bg-white flex-shrink-0 ${item.checked ? cItem.borderMain : ''}`}>
                            {item.checked && <CheckCircle2 size={18} className={`${cItem.text} no-print`} />}
                          </button>
                          <span className={`transition-all break-words w-full ${item.checked ? 'line-through text-stone-300' : ''}`}>{item.name || '名称未設定'}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                )}

                {currentTrip.budgets.length > 0 && (
                  <div className="print-card p-7 bg-white rounded-3xl border border-stone-100 shadow-[0_8px_30px_rgb(0,0,0,0.03)]">
                    <h2 className="text-xl font-black text-stone-700 border-b-2 border-stone-50 pb-4 mb-5 flex items-center">
                      <DollarSign className={`mr-2.5 ${cBudget.text}`} /> 予算・費用
                    </h2>
                    <div className="space-y-4 mb-5">
                      {currentTrip.budgets.map(budget => (
                        <div key={budget.id} className="flex justify-between items-center text-stone-600 font-bold border-b border-stone-50 pb-3">
                          <span className="truncate pr-2">{budget.name || '項目未定'}</span>
                          <span className="text-stone-700 flex-shrink-0">¥{Number(budget.amount || 0).toLocaleString()}</span>
                        </div>
                      ))}
                    </div>
                    <div className={`flex justify-between items-center pt-2 text-lg font-black ${cBudget.text} ${cBudget.bgLight} p-4 rounded-2xl border ${cBudget.borderLight}`}>
                      <span>合計</span><span>¥{totalBudget.toLocaleString()}</span>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Full Screen Image Viewer */}
          {viewerData.isOpen && (
            <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center no-print animate-in fade-in duration-200" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
              <button onClick={() => setViewerData({ ...viewerData, isOpen: false })} className="absolute top-4 right-4 text-white p-3 z-[110] bg-white/20 rounded-full active:bg-white/40 backdrop-blur"><X size={24} /></button>
              <div className="relative w-full h-full flex items-center justify-center px-4">
                {viewerData.currentIndex > 0 && <button onClick={(e) => { e.stopPropagation(); setViewerData(prev => ({ ...prev, currentIndex: prev.currentIndex - 1 })); }} className="absolute left-4 text-white p-3 bg-white/20 rounded-full z-[110] hidden sm:block backdrop-blur"><ChevronLeft size={28} /></button>}
                <img src={viewerData.images[viewerData.currentIndex]} alt="拡大プレビュー" className="max-w-full max-h-[85vh] object-contain transition-transform duration-300 rounded-lg" />
                {viewerData.currentIndex < viewerData.images.length - 1 && <button onClick={(e) => { e.stopPropagation(); setViewerData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 })); }} className="absolute right-4 text-white p-3 bg-white/20 rounded-full z-[110] hidden sm:block backdrop-blur"><ChevronRight size={28} /></button>}
              </div>
              {viewerData.images.length > 1 && (
                <div className="absolute bottom-8 left-0 w-full flex justify-center space-x-3 z-[110]">
                  {viewerData.images.map((_, i) => <div key={i} className={`w-2.5 h-2.5 rounded-full transition-colors duration-300 ${i === viewerData.currentIndex ? 'bg-white' : 'bg-white/30'}`} />)}
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const SettingsView = ({ trips, setTrips, currentThemeId, setCurrentThemeId, currentTheme, showAlert }) => {
      const cMain = colorClasses[currentTheme.primary];
      return (
        <div className="pb-24 pt-8 px-4 max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
          <div className="pl-2 mb-8">
            <h1 className="text-3xl font-extrabold tracking-tight text-stone-700">設定・データ</h1>
          </div>
          
          <div className="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-stone-100 overflow-hidden mb-6">
            <div className={`p-5 border-b border-stone-100 ${cMain.bgLight} font-bold text-stone-700 flex items-center text-lg`}>
              <Palette size={20} className={`mr-2 ${cMain.text}`}/> テーマカラー
            </div>
            <div className="p-6">
              <div className="grid grid-cols-5 gap-3">
                {Object.values(THEMES).map(t => (
                  <button key={t.id} onClick={() => setCurrentThemeId(t.id)} className="flex flex-col items-center justify-center space-y-2 group">
                    <div className={`w-12 h-12 sm:w-14 sm:h-14 rounded-full border-[3px] transition-all flex items-center justify-center ${currentThemeId === t.id ? `${colorClasses[t.primary].borderMain} scale-110 shadow-md` : 'border-transparent group-hover:scale-105'}`} style={{ backgroundColor: t.bgHex }}>
                      <div className={`w-8 h-8 sm:w-10 sm:h-10 rounded-full ${colorClasses[t.primary].bgMain}`}></div>
                    </div>
                    <span className={`text-[10px] sm:text-xs font-bold ${currentThemeId === t.id ? colorClasses[t.primary].text : 'text-stone-400'}`}>{t.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.03)] border border-stone-100 overflow-hidden mb-6">
            <div className="p-5 border-b border-stone-100 bg-stone-50/50 font-bold text-stone-700 flex items-center text-lg">
              <Download size={20} className={`mr-2 ${cMain.text}`}/> データ管理 (JSON)
            </div>
            <div className="p-6 space-y-4">
              <p className="text-sm text-stone-500 leading-relaxed font-medium">しおりのデータをJSON形式でエクスポート・インポートできます。</p>
              <div className="flex gap-4 pt-2">
                <button onClick={() => {
                    const jsonStr = JSON.stringify(trips);
                    const blob = new Blob([jsonStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = "journey_backup.json";
                    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
                  }} className={`flex-1 ${cMain.bgMain} text-white py-3.5 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-transform shadow-md ${cMain.shadowLight} ${cMain.bgHover}`}>
                  <Download size={18} className="mr-2" /> 保存
                </button>
                <label className={`flex-1 ${cMain.bgLight} ${cMain.text} py-3.5 rounded-xl font-bold flex items-center justify-center cursor-pointer active:scale-95 transition-transform ${cMain.bgMedium}`}>
                  <Upload size={18} className="mr-2" /> 読込
                  <input type="file" accept=".json" className="hidden" onChange={(e) => {
                      const file = e.target.files[0]; if (!file) return;
                      const reader = new FileReader();
                      reader.onload = (event) => {
                        try {
                          const imported = JSON.parse(event.target.result);
                          if (Array.isArray(imported)) { setTrips(imported); showAlert('インポートしました'); } else showAlert('不正なデータです');
                        } catch(err) { showAlert('エラー: ' + err.message); }
                      };
                      reader.readAsText(file);
                    }}/>
                </label>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const TabBar = ({ view, setView, currentTheme }) => {
      if (view === 'edit' || view === 'view') return null;
      const cMain = colorClasses[currentTheme.primary];
      return (
        <div className="fixed bottom-0 left-0 w-full z-50 px-4 pb-6 pt-2 pointer-events-none no-print">
          <div className="max-w-md mx-auto bg-white/80 backdrop-blur-xl border border-white/50 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex justify-around p-2 pointer-events-auto">
            <button onClick={() => setView('home')} className={`p-3 rounded-full flex flex-col items-center justify-center w-16 transition-colors ${view === 'home' ? cMain.text : 'text-stone-300 hover:bg-stone-50'}`}>
              <Home size={24} className={view === 'home' ? 'fill-current' : ''} />
              <span className="text-[10px] mt-1 font-bold">ホーム</span>
            </button>
            <button onClick={() => setView('templates')} className={`p-3 rounded-full flex flex-col items-center justify-center w-16 transition-colors ${view === 'templates' ? cMain.text : 'text-stone-300 hover:bg-stone-50'}`}>
              <Copy size={24} className={view === 'templates' ? 'fill-current' : ''} />
              <span className="text-[10px] mt-1 font-bold">テンプレ</span>
            </button>
            <button onClick={() => setView('settings')} className={`p-3 rounded-full flex flex-col items-center justify-center w-16 transition-colors ${view === 'settings' ? cMain.text : 'text-stone-300 hover:bg-stone-50'}`}>
              <Settings size={24} className={view === 'settings' ? 'fill-current' : ''} />
              <span className="text-[10px] mt-1 font-bold">設定</span>
            </button>
          </div>
        </div>
      );
    };

    // --- App Main ---
    function App() {
      const [trips, setTrips] = useState([]);
      const [view, setView] = useState('home');
      const [currentTripId, setCurrentTripId] = useState(null);
      const [currentThemeId, setCurrentThemeId] = useState('sakura');
      const [isLoaded, setIsLoaded] = useState(false);
      
      const [modalConfig, setModalConfig] = useState({ isOpen: false, message: '', onConfirm: null, isAlert: false });

      const showAlert = useCallback((message) => {
        setModalConfig({
          isOpen: true,
          message,
          isAlert: true,
          onConfirm: () => setModalConfig({ isOpen: false, message: '', onConfirm: null, isAlert: false })
        });
      }, []);

      const showConfirm = useCallback((message, onConfirmAction) => {
        setModalConfig({
          isOpen: true,
          message,
          isAlert: false,
          onConfirm: () => {
            onConfirmAction();
            setModalConfig({ isOpen: false, message: '', onConfirm: null, isAlert: false });
          }
        });
      }, []);

      useEffect(() => {
        const savedTrips = localStorage.getItem('journey_trips');
        if (savedTrips) setTrips(JSON.parse(savedTrips));
        else setTrips([initialTemplate]);
        
        const savedTheme = localStorage.getItem('journey_theme');
        if (savedTheme && THEMES[savedTheme]) setCurrentThemeId(savedTheme);
        
        setIsLoaded(true);
      }, []);

      useEffect(() => {
        if (isLoaded) {
          try {
            localStorage.setItem('journey_trips', JSON.stringify(trips));
            localStorage.setItem('journey_theme', currentThemeId);
          } catch (e) {
            console.error(e); 
            showAlert('保存容量の上限に達しました。不要な画像を削除してください。');
          }
        }
      }, [trips, currentThemeId, isLoaded, showAlert]);

      const currentTheme = THEMES[currentThemeId];
      const cMain = colorClasses[currentTheme.primary];

      useEffect(() => {
        document.documentElement.style.setProperty('--app-bg', currentTheme.bgHex);
        const metaThemeColor = document.getElementById('meta-theme-color');
        if (metaThemeColor) metaThemeColor.setAttribute('content', currentTheme.bgHex);
      }, [currentTheme]);

      const activeTrips = useMemo(() => trips.filter(t => !t.isTemplate).sort((a, b) => b.updatedAt - a.updatedAt), [trips]);
      const templates = useMemo(() => trips.filter(t => t.isTemplate).sort((a, b) => b.updatedAt - a.updatedAt), [trips]);
      const currentTrip = useMemo(() => trips.find(t => t.id === currentTripId), [trips, currentTripId]);

      const updateCurrentTrip = (updates) => {
        setTrips(prev => prev.map(t => t.id === currentTripId ? { ...t, ...updates, updatedAt: Date.now() } : t));
      };

      const handleCreate = (template = null) => {
        const newTrip = template ? { ...template, id: generateId(), title: template.title, isTemplate: false, startDate: '', endDate: '' } : getEmptyTrip();
        setTrips([newTrip, ...trips]); setCurrentTripId(newTrip.id); setView('edit');
      };

      const handleSaveAsTemplate = (trip) => {
        const newTemplate = { ...trip, id: generateId(), isTemplate: true, title: trip.title + ' (テンプレート)' };
        setTrips([newTemplate, ...trips]); showAlert('テンプレートとして保存しました');
      };

      const handleDelete = (id) => {
        showConfirm('本当に削除しますか？', () => {
          setTrips(prev => {
            const newTrips = prev.filter(t => t.id !== id);
            return newTrips;
          });
          if (currentTripId === id) { 
            setView('home'); 
            setCurrentTripId(null); 
          }
        });
      };

      return (
        <div className="min-h-screen relative selection:bg-stone-200 transition-colors duration-500">          
          {view === 'home' && <HomeView activeTrips={activeTrips} handleCreate={handleCreate} setCurrentTripId={setCurrentTripId} setView={setView} currentTheme={currentTheme} />}
          {view === 'templates' && <TemplatesView templates={templates} handleCreate={handleCreate} handleDelete={handleDelete} currentTheme={currentTheme} />}
          {view === 'edit' && <TripEditor currentTrip={currentTrip} updateCurrentTrip={updateCurrentTrip} handleDelete={handleDelete} setView={setView} currentTheme={currentTheme} showAlert={showAlert} />}
          {view === 'view' && <TripViewer currentTrip={currentTrip} setView={setView} setCurrentTripId={setCurrentTripId} handleSaveAsTemplate={handleSaveAsTemplate} updateCurrentTrip={updateCurrentTrip} currentTheme={currentTheme} />}
          {view === 'settings' && <SettingsView trips={trips} setTrips={setTrips} currentThemeId={currentThemeId} setCurrentThemeId={setCurrentThemeId} currentTheme={currentTheme} showAlert={showAlert} />}
          <TabBar view={view} setView={setView} currentTheme={currentTheme} />

          {/* Custom Modal */}
          {modalConfig.isOpen && (
            <div className="fixed inset-0 z-[200] bg-black/50 flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-xl text-center border border-stone-100">
                <p className="text-stone-700 font-bold mb-6 whitespace-pre-wrap">{modalConfig.message}</p>
                <div className="flex gap-3 justify-center">
                  {!modalConfig.isAlert && (
                    <button onClick={() => setModalConfig({ isOpen: false, message: '', onConfirm: null, isAlert: false })} className="flex-1 bg-stone-100 text-stone-600 font-bold py-3.5 rounded-xl hover:bg-stone-200 transition-colors">
                      キャンセル
                    </button>
                  )}
                  <button onClick={() => { if(typeof modalConfig.onConfirm === 'function') modalConfig.onConfirm(); }} className={`flex-1 ${cMain.bgMain} text-white font-bold py-3.5 rounded-xl ${cMain.bgHover} shadow-md ${cMain.shadowLight} transition-colors`}>
                    OK
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
