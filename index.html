  <style>
    :root {
      --app-bg: #FFF9F9;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.6);
      --pattern-color: rgba(251, 207, 232, 0.4);
    }
    body {
      background-color: var(--app-bg);
      font-family: 'Hiragino Maru Gothic ProN', 'Arial Rounded MT Bold', 'Rounded M+ 1c', -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      color: #44403c;
      transition: background-color 0.5s ease;
      overflow-x: hidden;
    }
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* ふわふわアニメーション */
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .animate-float {
      animation: float 4s ease-in-out infinite;
    }
    .animate-float-delayed {
      animation: float 4.5s ease-in-out infinite;
      animation-delay: 1.5s;
    }
    /* 可愛い水玉模様の背景 */
    .bg-cute-pattern {
      background-image: 
        radial-gradient(var(--pattern-color) 3px, transparent 3px),
        radial-gradient(var(--pattern-color) 3px, transparent 3px);
      background-position: 0 0, 20px 20px;
      background-size: 40px 40px;
    }
    @media print {
      body { background-color: white !important; background-image: none !important; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      .page-break { page-break-before: always; }
      .print-card { box-shadow: none !important; border: 1px solid #ddd; break-inside: avoid; }
      #root { padding: 0 !important; }
      .print-transparent-bg { background: transparent !important; }
    }
  </style>
</head>

      amber: { text: 'text-amber-500', bgLight: 'bg-amber-50/70', bgMedium: 'bg-amber-100', bgMain: 'bg-amber-400', bgHover: 'hover:bg-amber-500', borderLight: 'border-amber-200', borderMain: 'border-amber-400', ring: 'focus-within:border-amber-300 focus-within:ring-amber-200 focus:border-amber-300 focus:ring-amber-200', shadow: 'shadow-amber-200', shadowLight: 'shadow-amber-100', gradient: 'from-amber-200 via-yellow-300 to-orange-200' },
      orange: { text: 'text-orange-500', bgLight: 'bg-orange-50/70', bgMedium: 'bg-orange-100', bgMain: 'bg-orange-400', borderLight: 'border-orange-200', borderMain: 'border-orange-400', ring: 'focus-within:border-orange-300 focus-within:ring-orange-200', shadowLight: 'shadow-orange-100' },
      yellow: { text: 'text-yellow-500', bgLight: 'bg-yellow-50/70', bgMedium: 'bg-yellow-100', bgMain: 'bg-yellow-400', borderLight: 'border-yellow-200', borderMain: 'border-yellow-400', ring: 'focus-within:border-yellow-300 focus-within:ring-yellow-200', shadowLight: 'shadow-yellow-100' },
      teal: { text: 'text-teal-500', bgLight: 'bg-teal-50/70', bgMedium: 'bg-teal-100', bgMain: 'bg-teal-400', borderLight: 'border-teal-200', borderMain: 'border-teal-400', ring: 'focus-within:border-teal-300 focus-within:ring-teal-200', shadowLight: 'shadow-teal-100' },
      lime: { text: 'text-lime-500', bgLight: 'bg-lime-50/70', bgMedium: 'bg-lime-100', bgMain: 'bg-lime-400', borderLight: 'border-lime-200', borderMain: 'border-lime-400', ring: 'focus-within:border-lime-300 focus-within:ring-lime-200', shadowLight: 'shadow-lime-100' },
      cyan: { text: 'text-cyan-500', bgLight: 'bg-cyan-50/70', bgMedium: 'bg-cyan-100', bgMain: 'bg-cyan-400', borderLight: 'border-cyan-200', borderMain: 'border-cyan-400', ring: 'focus-within:border-cyan-300 focus-within:ring-cyan-200', shadowLight: 'shadow-cyan-100' },
      blue: { text: 'text-blue-500', bgLight: 'bg-blue-50/70', bgMedium: 'bg-blue-100', bgMain: 'bg-blue-400', borderLight: 'border-blue-200', borderMain: 'border-blue-400', ring: 'focus-within:border-blue-300 focus-within:ring-blue-200', shadowLight: 'shadow-blue-100' },
      indigo: { text: 'text-indigo-500', bgLight: 'bg-indigo-50/70', bgMedium: 'bg-indigo-100', bgMain: 'bg-indigo-400', borderLight: 'border-indigo-200', borderMain: 'border-indigo-400', ring: 'focus-within:border-indigo-300 focus-within:ring-indigo-200', shadowLight: 'shadow-indigo-100' },
      violet: { text: 'text-violet-500', bgLight: 'bg-violet-50/70', bgMedium: 'bg-violet-100', bgMain: 'bg-violet-400', borderLight: 'border-violet-200', borderMain: 'border-violet-400', ring: 'focus-within:border-violet-300 focus-within:ring-violet-200', shadowLight: 'shadow-violet-100' },
      fuchsia: { text: 'text-fuchsia-500', bgLight: 'bg-fuchsia-50/70', bgMedium: 'bg-fuchsia-100', bgMain: 'bg-fuchsia-400', borderLight: 'border-fuchsia-200', borderMain: 'border-fuchsia-400', ring: 'focus-within:border-fuchsia-300 focus-within:ring-fuchsia-200', shadowLight: 'shadow-fuchsia-100' },
      rose: { text: 'text-rose-500', bgLight: 'bg-rose-50/70', bgMedium: 'bg-rose-100', bgMain: 'bg-rose-400', borderLight: 'border-rose-200', borderMain: 'border-rose-400', ring: 'focus-within:border-rose-300 focus-within:ring-rose-200', shadowLight: 'shadow-rose-100' }
    };

    const THEMES = {
      sakura: {
        id: 'sakura', name: 'サクラ', bgHex: '#FFF9F9', bgGradient: 'from-pink-100/60 via-white/80 to-rose-100/60', primary: 'pink', patternColor: 'rgba(251, 207, 232, 0.4)',
        sections: { info: 'orange', memo: 'yellow', schedule: 'sky', items: 'emerald', budget: 'purple' }
      },
      mint: {
        id: 'mint', name: 'ミント', bgHex: '#F2FCF7', bgGradient: 'from-emerald-100/60 via-white/80 to-teal-100/60', primary: 'emerald', patternColor: 'rgba(167, 243, 208, 0.4)',
        sections: { info: 'teal', memo: 'lime', schedule: 'cyan', items: 'sky', budget: 'indigo' }
      },
      sky: {
        id: 'sky', name: 'スカイ', bgHex: '#F2F8FF', bgGradient: 'from-sky-100/60 via-white/80 to-blue-100/60', primary: 'sky', patternColor: 'rgba(186, 230, 253, 0.4)',
        sections: { info: 'blue', memo: 'indigo', schedule: 'violet', items: 'fuchsia', budget: 'pink' }
      },
      lavender: {
        id: 'lavender', name: 'ラベンダー', bgHex: '#F9F5FF', bgGradient: 'from-purple-100/60 via-white/80 to-fuchsia-100/60', primary: 'purple', patternColor: 'rgba(233, 213, 255, 0.4)',
        sections: { info: 'fuchsia', memo: 'pink', schedule: 'rose', items: 'orange', budget: 'amber' }
      },
      lemon: {
        id: 'lemon', name: 'レモン', bgHex: '#FFFCF0', bgGradient: 'from-amber-100/60 via-white/80 to-yellow-100/60', primary: 'amber', patternColor: 'rgba(253, 230, 138, 0.6)',
        sections: { info: 'orange', memo: 'amber', schedule: 'yellow', items: 'lime', budget: 'emerald' }
      }
    };

    // --- Utils ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const formatDate = (dateString) => {
      if (!dateString) return '';
      const options = { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' };
      return new Date(dateString).toLocaleDateString('ja-JP', options);
    };
    const calculateDays = (start, end) => {
      if (!start || !end) return 0;
      const diffTime = Math.abs(new Date(end) - new Date(start));
      return Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
    };
    const timeToMinutes = (timeStr) => {
      if (!timeStr) return 0;
      const [h, m] = timeStr.split(':').map(Number);
      return h * 60 + (m || 0);
    };

    const compressImage = (file, maxWidth = 800, quality = 0.7) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = (error) => reject(error);
        };
        reader.onerror = (error) => reject(error);
      });
    };

    // --- Mock Data ---
    const todayStr = new Date().toISOString().split('T')[0];
    const initialTemplate = {
      id: 'template-okinawa',
      title: '🌺 沖縄リゾート満喫プラン',
      subtitle: '海とグルメとリラックス',
      startDate: todayStr,
      endDate: todayStr,
      destination: '沖縄県',
      members: ['自分', '友人A', '友人B'],
      memo: '・レンタカーの免許証を忘れないこと\n・日焼け止め必須',
      coverImage: '',
      items: [
        { id: 'i1', name: '水着・ラッシュガード', checked: false },
        { id: 'i2', name: 'サングラス', checked: false },
        { id: 'i3', name: 'モバイルバッテリー', checked: false },
      ],
      budgets: [
        { id: 'b1', name: '航空券', amount: 35000 },
        { id: 'b2', name: 'ホテル代', amount: 20000 },
        { id: 'b3', name: 'レンタカー', amount: 8000 },
      ],
      schedules: {
        1: [
          { id: 's1', time: '10:00', content: '那覇空港 到着', location: '那覇空港', mapLink: '', infoLink: '', infoLinkLabel: '', memo: 'レンタカー送迎バスへ', images: [] },
          { id: 's2', time: '12:00', content: 'ウミカジテラスでランチ', location: '瀬長島ウミカジテラス', mapLink: 'https://maps.app.goo.gl/xxx', infoLink: 'https://www.umikajiterrace.com/', infoLinkLabel: '公式サイト', memo: 'タコライスを食べる', images: [] },
          { id: 's3', time: '15:00', content: 'ホテルチェックイン', location: '恩納村リゾートホテル', mapLink: '', infoLink: '', infoLinkLabel: '', memo: 'オーシャンビューの部屋', images: [] },
          { id: 's4', time: '19:00', content: '国際通りでディナー', location: '国際通り', mapLink: '', infoLink: 'https://example.com/reserve', infoLinkLabel: '予約画面', memo: '沖縄料理の居酒屋', images: [] },
        ]
      },
      isTemplate: true,
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };

    const getEmptyTrip = () => ({
      id: generateId(), title: '', subtitle: '', startDate: '', endDate: '', destination: '', members: [], memo: '', coverImage: '', items: [], budgets: [], schedules: { 1: [] }, isTemplate: false, createdAt: Date.now(), updatedAt: Date.now()
    });

    // --- Components ---
    
    // フルスクリーン画像ビューア（ピンチズーム・スワイプ対応版）
    const FullScreenImageViewer = ({ viewerData, setViewerData }) => {
      const [scale, setScale] = useState(1);
      const [position, setPosition] = useState({ x: 0, y: 0 });
      const [isDragging, setIsDragging] = useState(false);
      
      const touchState = useRef({
        startX: 0,
        startY: 0,
        lastX: 0,
        lastY: 0,
        startDistance: 0,
        startScale: 1,
        isPinching: false,
        swiped: false
      });

      if (!viewerData.isOpen) return null;

      const getDistance = (touches) => {
        return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
      };

      const handleTouchStart = (e) => {
        setIsDragging(true);
        touchState.current.swiped = false;

        if (e.touches.length === 2) {
          touchState.current.isPinching = true;
          touchState.current.startDistance = getDistance(e.touches);
          touchState.current.startScale = scale;
        } else if (e.touches.length === 1) {
          touchState.current.startX = e.touches[0].clientX - position.x;
          touchState.current.startY = e.touches[0].clientY - position.y;
          // スワイプ判定用の初期X
          touchState.current.lastX = e.touches[0].clientX;
        }
      };

      const handleTouchMove = (e) => {
        if (e.touches.length === 2) {
          const distance = getDistance(e.touches);
          const scaleChange = distance / touchState.current.startDistance;
          // 倍率制限 (1〜6倍)
          const newScale = Math.max(1, Math.min(touchState.current.startScale * scaleChange, 6));
          setScale(newScale);
        } else if (e.touches.length === 1 && !touchState.current.isPinching) {
          if (scale > 1) {
            // 拡大中のパン（移動）
            const newX = e.touches[0].clientX - touchState.current.startX;
            const newY = e.touches[0].clientY - touchState.current.startY;
            setPosition({ x: newX, y: newY });
          } else {
            // スワイプ用記録
            touchState.current.lastX = e.touches[0].clientX;
          }
        }
      };

      const handleTouchEnd = (e) => {
        setIsDragging(false);
        if (e.touches.length === 0) {
          touchState.current.isPinching = false;
          
          if (scale <= 1) {
            resetZoom();
            // スワイプ判定 (スケールが1の時のみ)
            const startXRaw = touchState.current.startX + position.x;
            const endXRaw = touchState.current.lastX;
            const distance = startXRaw - endXRaw;
            
            if (distance > 50 && viewerData.currentIndex < viewerData.images.length - 1 && !touchState.current.swiped) {
              touchState.current.swiped = true;
              setViewerData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 }));
            } else if (distance < -50 && viewerData.currentIndex > 0 && !touchState.current.swiped) {
              touchState.current.swiped = true;
              setViewerData(prev => ({ ...prev, currentIndex: prev.currentIndex - 1 }));
            }
          }
        }
      };

      const resetZoom = () => {
        setScale(1);
        setPosition({ x: 0, y: 0 });
      };

      return (
        <div 
          className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center no-print animate-in fade-in duration-200"
          style={{ touchAction: 'none' }} // デフォルトジェスチャーの防止
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
          onTouchCancel={handleTouchEnd}
        >
          <button onClick={() => { resetZoom(); setViewerData({ ...viewerData, isOpen: false }); }} className="absolute top-4 right-4 text-white p-3 z-[110] bg-white/20 rounded-full active:bg-white/40 backdrop-blur"><X size={24} /></button>
          
          <div className="relative w-full h-full flex items-center justify-center px-4 overflow-hidden">
            {viewerData.currentIndex > 0 && scale === 1 && (

                <ChevronLeft size={28} />
              </button>
            )}
            
            <img 
              src={viewerData.images[viewerData.currentIndex]} 
              alt="拡大プレビュー" 
              className={`max-w-full max-h-[85vh] object-contain rounded-lg pointer-events-none ${isDragging ? '' : 'transition-transform duration-300 ease-out'}`}
              style={{ transform: `translate3d(${position.x}px, ${position.y}px, 0) scale(${scale})` }}
            />

            {viewerData.currentIndex < viewerData.images.length - 1 && scale === 1 && (
              <button onClick={(e) => { e.stopPropagation(); setViewerData(prev => ({ ...prev, currentIndex: prev.currentIndex + 1 })); resetZoom(); }} className="absolute right-4 text-white p-3 bg-white/20 rounded-full z-[110] hidden sm:block backdrop-blur">
                <ChevronRight size={28} />
              </button>
            )}
          </div>

          {viewerData.images.length > 1 && scale === 1 && (
            <div className="absolute bottom-8 left-0 w-full flex justify-center space-x-3 z-[110]">
              {viewerData.images.map((_, i) => <div key={i} className={`w-2.5 h-2.5 rounded-full transition-colors duration-300 ${i === viewerData.currentIndex ? 'bg-white' : 'bg-white/30'}`} />)}
            </div>
          )}
        </div>
      );
    };

    const GlassCard = ({ children, className = '', onClick }) => (
      <div className={`bg-white/80 backdrop-blur-md rounded-[2rem] shadow-sm border-2 border-white overflow-hidden transition-all duration-300 ${onClick ? 'cursor-pointer active:scale-[0.98] hover:shadow-md' : ''} ${className}`} onClick={onClick}>
        {children}
      </div>
    );

    const Accordion = ({ title, icon: Icon, themeColorName = 'pink', defaultOpen = false, children, rightAction, isPrintable = false, className = 'mb-6' }) => {
      const [isOpen, setIsOpen] = useState(defaultOpen);
      const c = colorClasses[themeColorName];
      return (
        <div className={`bg-white/80 backdrop-blur-md rounded-[2rem] shadow-sm border-2 sm:border-4 border-dashed ${c.borderLight} overflow-hidden ${isPrintable ? 'print-card' : 'no-print'} ${className}`}>
          <div className={`flex items-center justify-between p-5 cursor-pointer select-none hover:bg-white/50 transition-colors ${isPrintable ? 'print:border-b print:border-stone-100' : ''}`} onClick={() => setIsOpen(!isOpen)}>
            <div className="flex items-center space-x-4">
              <div className={`p-2.5 ${c.bgLight} ${c.text} rounded-2xl shadow-sm border border-white`}>
                <Icon size={22} />
              </div>
              <h3 className="font-black text-stone-700 text-lg tracking-wide">{title}</h3>
            </div>
            <div className={`flex items-center space-x-2 ${isPrintable ? 'print:hidden' : ''}`}>
              {rightAction && <div onClick={(e) => e.stopPropagation()}>{rightAction}</div>}
              <ChevronDown size={22} className={`${c.text} opacity-60 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} />
            </div>
          </div>
          <div className={`transition-all duration-300 ease-in-out ${isOpen ? 'max-h-[2000px] opacity-100' : 'max-h-0 opacity-0'} ${isPrintable ? 'print:max-h-none print:opacity-100' : ''}`}>
            <div className={`p-5 pt-0 border-t-2 border-dashed ${c.borderLight} ${isPrintable ? 'print:border-none' : ''}`}>
              {children}
            </div>
          </div>
        </div>
      );
    };

    // --- Views ---
    const HomeView = ({ activeTrips, handleCreate, setCurrentTripId, setView, currentTheme }) => {
      const cMain = colorClasses[currentTheme.primary];
      return (
        <div className="pb-24 pt-4 px-4 max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
          
          {/* 可愛いヘッダーデザイン */}
          <div className="mb-12 pt-8 pb-4 text-center relative">
            {/* 背景のふわふわ装飾 */}
            <div className={`absolute top-0 left-[10%] w-24 h-24 ${cMain.bgLight} rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-pulse`}></div>
            <div className={`absolute -top-4 right-[10%] w-32 h-32 ${colorClasses[currentTheme.sections.info].bgLight} rounded-full mix-blend-multiply filter blur-xl opacity-60 animate-pulse`} style={{ animationDelay: '1s' }}></div>
            <div className={`absolute top-10 left-[40%] w-20 h-20 ${colorClasses[currentTheme.sections.memo].bgLight} rounded-full mix-blend-multiply filter blur-lg opacity-60 animate-pulse`} style={{ animationDelay: '2s' }}></div>
            
            <div className={`inline-flex items-center justify-center px-4 py-1.5 mb-6 ${cMain.bgLight} rounded-full shadow-[0_4px_15px_rgba(0,0,0,0.05)] border-2 border-white/90 backdrop-blur-sm relative z-10 transform hover:scale-105 transition-transform`}>
              <Sparkles size={14} className={`mr-1.5 ${cMain.text} animate-pulse`} />
              <span className={`text-[11px] font-black tracking-widest uppercase ${cMain.text}`}>Journey App</span>
            </div>
            
            <div className="relative inline-flex items-center justify-center mb-6 w-full z-10">
              {/* 装飾用アイコン */}
              <div className="absolute -top-5 left-[10%] sm:left-[20%] transform -rotate-12 animate-float opacity-90 z-20">
                <span className="text-3xl drop-shadow-md">✨</span>
              </div>
              <div className="absolute -bottom-3 right-[10%] sm:right-[20%] transform rotate-12 animate-float-delayed opacity-90 z-20">
                <span className="text-4xl drop-shadow-md">✈️</span>
              </div>
              
              <div className="relative inline-block px-4">
                {/* 縁取り用（後ろ） */}
                <h1 
                  className="text-[2.5rem] sm:text-5xl font-black tracking-widest text-white absolute left-0 top-0 w-full h-full z-0 drop-shadow-[0_4px_8px_rgba(0,0,0,0.12)] flex items-center justify-center pointer-events-none whitespace-nowrap" 
                  style={{ WebkitTextStroke: '10px white' }}
                >
                  旅のしおり
                </h1>
                {/* メインカラー（前） */}
                <h1 className={`text-[2.5rem] sm:text-5xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-br ${cMain.gradient} relative z-10 py-1 whitespace-nowrap`}>
                  旅のしおり
                </h1>
              </div>
            </div>
            
            <div className="relative z-10">
              <p className="text-stone-500 font-bold text-sm flex items-center justify-center gap-1.5 bg-white/70 backdrop-blur-md inline-flex px-6 py-2.5 rounded-full shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-white/80">
                ワクワクする計画を立てよう <span className="text-lg ml-1">🎈</span>
              </p>
            </div>
          </div>

          {activeTrips.length === 0 ? (
            <div className="text-center py-20 bg-white/90 backdrop-blur-sm rounded-[2rem] border-4 border-dashed border-stone-200/50 shadow-sm relative z-10">
              <div className={`${cMain.bgLight} w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-white shadow-sm`}>
                <MapPin size={32} className={cMain.text} />
              </div>
              <h3 className="text-lg font-bold text-stone-700">予定がありません</h3>
              <p className="text-stone-400 mt-2 mb-6 font-medium">新しい旅の計画を始めましょう</p>
              <button onClick={() => handleCreate()} className={`${cMain.bgMain} ${cMain.bgHover} text-white px-7 py-3.5 rounded-2xl font-bold active:scale-95 transition-all shadow-md ${cMain.shadow} border-2 border-white`}>
                新規作成
              </button>
            </div>
          ) : (
            <div className="space-y-5 relative z-10">
              {activeTrips.map(trip => {
                const daysToTrip = trip.startDate ? Math.ceil((new Date(trip.startDate) - new Date()) / (1000 * 60 * 60 * 24)) : null;
                return (
                  <GlassCard key={trip.id} className="p-5 relative group border-4 border-white/80 hover:border-white" onClick={() => { setCurrentTripId(trip.id); setView('view'); }}>
                    <div className="absolute top-4 right-4 flex space-x-2 z-10">
                      <button onClick={(e) => { e.stopPropagation(); setCurrentTripId(trip.id); setView('edit'); }} className={`p-2.5 bg-white/90 backdrop-blur rounded-full text-stone-400 ${cMain.text} shadow-sm border border-stone-100 transition-colors hover:bg-stone-50`}>
                        <MoreHorizontal size={18} />
                      </button>
                    </div>
                    <div className="flex items-start space-x-4">
                      <div className={`w-16 h-16 rounded-2xl bg-gradient-to-br ${cMain.gradient} flex items-center justify-center flex-shrink-0 text-2xl shadow-inner overflow-hidden border-2 border-white`}>
                        {trip.coverImage ? <img src={trip.coverImage} alt="Cover" className="w-full h-full object-cover" /> : <span>✈️</span>}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center space-x-2 mb-1">
                          {daysToTrip !== null && daysToTrip > 0 && daysToTrip <= 30 && (
                            <span className={`bg-orange-50 text-orange-500 text-xs font-bold px-2.5 py-1 rounded-full border border-orange-100 shadow-sm`}>あと {daysToTrip} 日</span>
                          )}
                          {daysToTrip !== null && daysToTrip < 0 && (
                            <span className="bg-stone-100 text-stone-400 text-xs font-bold px-2.5 py-1 rounded-full shadow-sm border border-stone-200">終了</span>
                          )}
                        </div>
                        <h2 className="text-xl font-extrabold text-stone-700 line-clamp-2 mb-1 leading-snug">{trip.title || '無題の旅行'}</h2>
                        {trip.destination && <p className="text-stone-400 text-sm flex items-center font-medium"><MapPin size={14} className="mr-1 inline opacity-70" />{trip.destination}</p>}
                        <p className="text-stone-400 text-sm mt-1 flex items-center font-medium"><Calendar size={14} className="mr-1 inline opacity-70" />{trip.startDate ? formatDate(trip.startDate) : '日程未定'}</p>
                      </div>
                    </div>
                  </GlassCard>
                )
              })}
            </div>
          )}
        </div>
      );
    };

    const TemplatesView = ({ templates, handleCreate, handleDelete, currentTheme }) => {
      const cMain = colorClasses[currentTheme.primary];
      return (
        <div className="pb-24 pt-8 px-4 max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500 relative z-10 overflow-x-hidden">
           <div className="mb-10 pl-2 pt-2 text-center">
            <div className={`inline-flex items-center justify-center px-4 py-1.5 mb-4 ${cMain.bgLight} rounded-full shadow-sm border border-white/80 backdrop-blur-sm`}>
              <Copy size={14} className={`mr-1.5 ${cMain.text}`} />
              <span className={`text-[11px] font-black tracking-widest uppercase ${cMain.text}`}>Templates</span>
            </div>
            <h1 className="text-3xl sm:text-4xl font-black tracking-tight text-stone-700 drop-shadow-sm">テンプレート</h1>
            <p className="text-stone-500 mt-2 font-bold text-sm">過去のプランを再利用しよう</p>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {templates.map(template => (
              <GlassCard key={template.id} className="p-5 flex flex-col h-full border-4 border-white/80 hover:border-white bg-white/90">
                <div className="flex-1">
                  <h3 className="font-extrabold text-lg text-stone-700 mb-2 line-clamp-2 leading-snug">{template.title}</h3>
                  <p className="text-sm text-stone-400 mb-4 line-clamp-2 font-medium">{template.subtitle || '説明なし'}</p>
                  <div className="flex flex-wrap gap-2 mb-4">
                    <span className="text-xs bg-white/80 text-stone-500 px-3 py-1.5 rounded-full border border-stone-100 font-bold shadow-sm">持ち物 {template.items?.length || 0}</span>
                    <span className="text-xs bg-white/80 text-stone-500 px-3 py-1.5 rounded-full border border-stone-100 font-bold shadow-sm">予定 {Object.values(template.schedules).flat().length}</span>
                  </div>
                </div>
                <div className="flex space-x-2 mt-auto">
                  <button onClick={() => handleCreate(template)} className={`flex-1 ${cMain.bgLight} ${cMain.text} py-2.5 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-transform ${cMain.bgMedium} border border-white shadow-sm`}>
                    <Copy size={16} className="mr-2" />この構成で作る
                  </button>
                  <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleDelete(template.id); }} className="p-2.5 bg-rose-50 text-rose-400 rounded-xl active:scale-95 transition-transform hover:bg-rose-100 border border-white shadow-sm">
                    <Trash2 size={16} />
                  </button>
                </div>
              </GlassCard>
            ))}
          </div>
        </div>
      );
    };

    const TripEditor = ({ currentTrip, updateCurrentTrip, handleDelete, setView, currentTheme, showAlert }) => {
      if (!currentTrip) return null;
      const daysCount = calculateDays(currentTrip.startDate, currentTrip.endDate) || 1;
      const [activeDay, setActiveDay] = useState(1);
      const [viewerData, setViewerData] = useState({ isOpen: false, images: [], currentIndex: 0 });
      
      const titleRef = useRef(null);
      const subtitleRef = useRef(null);
      
      const cMain = colorClasses[currentTheme.primary];
      const cInfo = colorClasses[currentTheme.sections.info];
      const cMemo = colorClasses[currentTheme.sections.memo];
      const cSched = colorClasses[currentTheme.sections.schedule];
      const cItem = colorClasses[currentTheme.sections.items];
      const cBudget = colorClasses[currentTheme.sections.budget];

      const updateItems = (newItems) => updateCurrentTrip({ items: newItems });
      const updateBudgets = (newBudgets) => updateCurrentTrip({ budgets: newBudgets });
      const updateSchedules = (newSchedules) => updateCurrentTrip({ schedules: newSchedules });
      
      const handleAddSchedule = (day) => {
        const daySchedules = currentTrip.schedules[day] || [];
        updateSchedules({ ...currentTrip.schedules, [day]: [...daySchedules, { id: generateId(), time: '10:00', content: '', location: '', mapLink: '', infoLink: '', infoLinkLabel: '', memo: '', images: [] }] });
      };

      const moveSchedule = (day, index, direction) => {
        const list = [...(currentTrip.schedules[day] || [])];
        if (direction === 'up' && index > 0) {
          [list[index - 1], list[index]] = [list[index], list[index - 1]];
        } else if (direction === 'down' && index < list.length - 1) {
          [list[index + 1], list[index]] = [list[index], list[index + 1]];
        }
        updateSchedules({ ...currentTrip.schedules, [day]: list });
      };

      useEffect(() => {
        if (titleRef.current) {
          titleRef.current.style.height = 'auto';
          titleRef.current.style.height = titleRef.current.scrollHeight + 'px';
        }
        if (subtitleRef.current) {
          subtitleRef.current.style.height = 'auto';
          subtitleRef.current.style.height = subtitleRef.current.scrollHeight + 'px';
        }
      }, [currentTrip.title, currentTrip.subtitle]);

      const totalBudget = currentTrip.budgets.reduce((sum, b) => sum + (Number(b.amount) || 0), 0);

      return (
        <div className="pb-32 min-h-screen animate-in fade-in duration-300 relative z-10 overflow-x-hidden">
          <div className="sticky top-0 z-40 bg-white/70 backdrop-blur-xl border-b border-white/50 shadow-sm">
            <div className="flex items-center justify-between py-2 px-4 max-w-2xl mx-auto">
              <button onClick={() => setView('view')} className={`text-stone-500 flex items-center font-bold px-3 py-1.5 text-sm rounded-full bg-white/80 hover:bg-white transition-colors border border-stone-200/50 shadow-sm`}>
                <ChevronLeft size={16} className="mr-1" /> 完了
              </button>
              <span className="font-extrabold text-stone-600 text-sm tracking-wide">編集中</span>
              <button onClick={() => handleDelete(currentTrip.id)} className="text-rose-400 p-2 hover:bg-white bg-white/80 rounded-full transition-colors border border-stone-200/50 shadow-sm">
                <Trash2 size={16} />
              </button>
            </div>
          </div>

          <div className="w-full relative">
            {/* Cover Image in Editor - Full Width */}
            <div className="mb-6 relative w-full">
              {currentTrip.coverImage ? (
                <div className={`w-full ${cMain.bgLight} flex justify-center items-center border-y-4 border-white shadow-sm group relative`}>
                  <img src={currentTrip.coverImage} alt="Cover" className="w-full h-auto object-contain cursor-pointer hover:opacity-90 transition-opacity" onClick={() => setViewerData({ isOpen: true, images: [currentTrip.coverImage], currentIndex: 0 })} />
                  <button onClick={() => updateCurrentTrip({ coverImage: '' })} className="absolute top-4 right-4 bg-stone-800/60 backdrop-blur text-white rounded-full p-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity hover:bg-rose-400 z-20 border border-white/20"><X size={16} /></button>
                </div>
              ) : (
                <div className={`w-full ${cMain.bgLight} flex justify-center items-center min-h-[12rem] border-y-4 border-white shadow-sm relative`}>
                  <label className={`flex flex-col items-center justify-center ${cMain.text} cursor-pointer hover:bg-white/40 transition-colors w-full h-full py-10 z-20`}>
                    <div className={`p-3 bg-white/50 rounded-full mb-3 shadow-sm border border-white`}>
                      <Camera size={32} className="opacity-80" />
                    </div>
                    <span className="text-sm font-black opacity-90 tracking-wide">カバー画像を追加</span>
                    <input type="file" accept="image/*" className="hidden" onChange={async (e) => {
                         const file = e.target.files[0];
                         if (file) {
                           try {
                             const base64Img = await compressImage(file, 1200);
                             updateCurrentTrip({ coverImage: base64Img });
                           } catch (err) { showAlert('画像の読み込みに失敗しました'); }
                         }
                       }} />
                  </label>
                </div>
              )}
            </div>

            <div className="px-4 max-w-2xl mx-auto space-y-6">
              {/* Title Section */}
              <div className={`bg-white/80 backdrop-blur-md rounded-[2.5rem] shadow-sm border-4 border-white relative overflow-hidden`}>
                 <div className={`absolute top-0 left-0 w-full h-3 bg-gradient-to-r ${cMain.gradient} z-10`}></div>
                 <div className="p-6 pt-8">
                   <textarea
                    ref={titleRef}
                    placeholder="無題の旅行"
                    className="text-3xl font-black w-full bg-white/50 rounded-2xl p-3 border-2 border-transparent hover:border-white focus:border-white outline-none placeholder-stone-300 text-stone-700 focus:ring-0 resize-none overflow-hidden leading-tight text-center transition-all shadow-sm focus:shadow-md"
                    rows="1"
                    value={currentTrip.title}
                    onChange={e => updateCurrentTrip({ title: e.target.value })}
                  />
                  <textarea
                    ref={subtitleRef}
                    placeholder="サブタイトル・キャッチコピー"
                    className="text-stone-500 w-full mt-3 bg-white/50 rounded-xl p-2 border-2 border-transparent hover:border-white focus:border-white outline-none text-base placeholder-stone-300 font-bold focus:ring-0 resize-none overflow-hidden leading-snug text-center transition-all"
                    rows="1"
                    value={currentTrip.subtitle}
                    onChange={e => updateCurrentTrip({ subtitle: e.target.value })}
                  />
                 </div>
              </div>

              {/* Basic Info */}
              <Accordion title="基本情報" icon={MapPin} themeColorName={currentTheme.sections.info} defaultOpen={true}>
                <div className="space-y-4">
                  <div>
                    <label className="text-xs font-black text-stone-400 uppercase tracking-widest mb-1.5 block ml-1">行き先</label>
                    <div className={`flex items-center bg-white/70 backdrop-blur-sm rounded-2xl p-3 border-2 border-white transition-all ${cInfo.ring} shadow-sm`}>
                      <MapPin size={18} className={`${cInfo.text} mr-2`} />
                      <input type="text" className="bg-transparent w-full outline-none text-stone-700 font-bold" placeholder="ハワイ、京都など" value={currentTrip.destination} onChange={e => updateCurrentTrip({ destination: e.target.value })} />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs font-black text-stone-400 uppercase tracking-widest mb-1.5 block ml-1">出発日</label>
                      <input type="date" className={`w-full bg-white/70 backdrop-blur-sm rounded-2xl p-3 outline-none text-stone-700 font-bold border-2 border-white transition-all ${cInfo.ring} shadow-sm`} value={currentTrip.startDate} onChange={e => updateCurrentTrip({ startDate: e.target.value })} />
                    </div>
                    <div>
                      <label className="text-xs font-black text-stone-400 uppercase tracking-widest mb-1.5 block ml-1">帰宅日</label>
                      <input type="date" className={`w-full bg-white/70 backdrop-blur-sm rounded-2xl p-3 outline-none text-stone-700 font-bold border-2 border-white transition-all ${cInfo.ring} shadow-sm`} value={currentTrip.endDate} onChange={e => updateCurrentTrip({ endDate: e.target.value })} />
                    </div>
                  </div>
                  <div>
                    <label className="text-xs font-black text-stone-400 uppercase tracking-widest mb-1.5 block ml-1">メンバー</label>
                    <div className={`flex items-center bg-white/70 backdrop-blur-sm rounded-2xl p-3 border-2 border-white transition-all ${cInfo.ring} shadow-sm`}>
                      <Users size={18} className={`${cInfo.text} mr-2`} />
                      <input type="text" className="bg-transparent w-full outline-none text-stone-700 font-bold" placeholder="自分, 友人A (カンマ区切り)" value={currentTrip.members.join(', ')} onChange={e => updateCurrentTrip({ members: e.target.value.split(',').map(s=>s.trim()).filter(Boolean) })} />
                    </div>
                  </div>
                  <div className="flex flex-col items-center pt-2">
                    <label className="text-xs font-black text-stone-400 uppercase tracking-widest mb-1.5 block text-center w-full relative">
                      <span className="relative z-10">全体メモ</span>
                      <div className="absolute top-1/2 left-0 w-full h-px bg-stone-200 z-0"></div>
                    </label>
                    <textarea className={`w-full bg-white/70 backdrop-blur-sm rounded-2xl p-4 outline-none text-stone-700 font-bold border-2 border-white min-h-[100px] resize-none transition-all leading-relaxed text-center ${cMemo.ring} shadow-sm mt-2`} placeholder="旅行の目的や全体メモ" value={currentTrip.memo} onChange={e => updateCurrentTrip({ memo: e.target.value })} />
                  </div>
                </div>
              </Accordion>

              {/* Schedule Builder */}
              <div className={`bg-white/80 backdrop-blur-md rounded-[2rem] shadow-sm border-2 sm:border-4 border-dashed ${cSched.borderLight} overflow-hidden pb-5`}>
                 <div className={`p-5 ${cSched.bgLight} border-b-2 border-dashed ${cSched.borderLight} flex flex-col sm:flex-row sm:items-center justify-between gap-4`}>
                    <div className="flex items-center space-x-4">
                      <div className={`p-2.5 ${cSched.bgMedium} ${cSched.text} rounded-2xl shadow-sm border border-white`}>
                        <Calendar size={22} />
                      </div>
                      <h3 className="font-black text-stone-700 text-lg tracking-wide">スケジュール編集</h3>
                    </div>
                    <div className={`flex bg-white/80 backdrop-blur-sm rounded-2xl p-1.5 shadow-sm border border-white overflow-x-auto hide-scrollbar`}>
                      {Array.from({ length: daysCount }).map((_, i) => (
                        <button key={i} onClick={() => setActiveDay(i + 1)} className={`px-5 py-2 rounded-xl text-sm font-black transition-all whitespace-nowrap ${activeDay === i + 1 ? `${cSched.bgMain} text-white shadow-md border border-white/20` : 'text-stone-400 hover:bg-white'}`}>
                          Day {i + 1}
                        </button>
                      ))}
                    </div>
                 </div>
                 
                 <div className="p-4 sm:p-5 space-y-5">
                   <div className="flex justify-end mb-2">
                      <button className={`text-xs bg-white/80 backdrop-blur-sm ${cSched.text} px-4 py-2 rounded-full font-bold flex items-center border-2 border-white hover:shadow-md transition-all shadow-sm active:scale-95`}>
                        <Wand2 size={14} className="mr-1.5" /> AIで自動生成 (Beta)
                      </button>
                   </div>

                   <div id={`timeline-edit-${activeDay}`} className="relative pb-6 w-full max-w-full">
                      <div className={`absolute top-2 bottom-0 left-[20px] sm:left-[24px] w-2 ${cSched.bgLight} z-0 rounded-full border border-white`}></div>

                      <div className="space-y-6 w-full max-w-full mt-2">
                        {(currentTrip.schedules[activeDay] || []).map((item, index) => {
                          const itemImages = item.images || (item.image ? [item.image] : []);

                          return (
                            <div key={item.id} id={`card-edit-${item.id}`} className="relative z-10 pl-[38px] sm:pl-[46px] w-full max-w-full pr-1 pt-6 mb-4">
                                <div id={`dot-edit-${item.id}`} className={`absolute w-[18px] h-[18px] bg-white border-[4px] ${cSched.borderMain} rounded-full left-[9px] sm:left-[13px] top-[40px] shadow-sm z-10`}></div>
                                
                                <div className="relative w-full">
                                  {/* 時刻バッジ */}
                                  <div id={`time-edit-${item.id}`} className={`absolute -top-5 left-2 sm:left-4 z-20`}>
                                    <div className={`flex items-center bg-white border-2 border-white rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.08)] overflow-hidden p-0.5 transform -rotate-2`}>
                                      <div className={`bg-stone-50 text-stone-400 p-1.5 rounded-full`}>
                                        <Clock size={14} />
                                      </div>
                                      <input type="time" className={`bg-transparent px-2 py-1 text-sm font-black outline-none ${cSched.text} w-[5.5rem] text-center cursor-pointer`} value={item.time} onChange={(e) => {
                                        const newSchedules = [...currentTrip.schedules[activeDay]];
                                        newSchedules[index].time = e.target.value; updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                      }}/>
                                    </div>
                                  </div>

                                  {/* カード本体 */}
                                  <div className={`w-full bg-white/90 backdrop-blur-sm rounded-[2rem] p-4 sm:p-5 pt-8 sm:pt-8 shadow-sm border-2 sm:border-4 border-dashed ${cSched.borderLight} relative overflow-hidden group hover:shadow-md transition-all`}>
                                    
                                    {/* アクションボタン */}
                                    <div className="absolute top-2 right-2 flex items-center gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity z-20 bg-white/90 backdrop-blur-sm rounded-full p-1 shadow-sm border border-stone-100">
                                      <button onClick={() => moveSchedule(activeDay, index, 'up')} className={`text-stone-400 hover:text-sky-500 p-1.5 rounded-full hover:bg-stone-100 transition-colors`}><ArrowUp size={14} /></button>
                                      <button onClick={() => moveSchedule(activeDay, index, 'down')} className={`text-stone-400 hover:text-sky-500 p-1.5 rounded-full hover:bg-stone-100 transition-colors`}><ArrowDown size={14} /></button>
                                      <button onClick={() => {
                                          const newSchedules = currentTrip.schedules[activeDay].filter((_, i) => i !== index); updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                      }} className="text-stone-400 hover:text-rose-500 p-1.5 rounded-full hover:bg-rose-50 transition-colors"><Trash2 size={14} /></button>
                                    </div>
                                    
                                    <input type="text" placeholder="予定の内容 (例: 水族館へ)" className={`w-full bg-white/60 border-2 border-white rounded-2xl px-4 py-2.5 font-black outline-none text-stone-700 placeholder-stone-300 transition-all text-base ${cSched.ring} mb-3 mt-1 shadow-sm`} value={item.content} onChange={(e) => {
                                      const newSchedules = [...currentTrip.schedules[activeDay]];
                                      newSchedules[index].content = e.target.value; updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                    }}/>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                                      <div className={`flex items-center bg-white/60 rounded-xl px-3 border-2 border-white transition-all ${cSched.ring} shadow-sm`}>
                                        <MapPin size={16} className={`${cSched.text} mr-2 flex-shrink-0 opacity-70`} />
                                        <input type="text" placeholder="場所 (例: 美ら海水族館)" className="w-full bg-transparent outline-none py-2.5 text-sm text-stone-600 font-bold" value={item.location} onChange={(e) => {
                                          const newSchedules = [...currentTrip.schedules[activeDay]]; newSchedules[index].location = e.target.value; updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                        }}/>
                                      </div>
                                      <div className={`flex items-center bg-white/60 rounded-xl px-3 border-2 border-white transition-all ${cSched.ring} shadow-sm`}>
                                        <LinkIcon size={16} className={`${cSched.text} mr-2 flex-shrink-0 opacity-70`} />
                                        <input type="text" placeholder="Mapリンク" className={`w-full bg-transparent outline-none py-2.5 text-sm ${cSched.text} font-bold placeholder-stone-300`} value={item.mapLink} onChange={(e) => {
                                          const newSchedules = [...currentTrip.schedules[activeDay]]; newSchedules[index].mapLink = e.target.value; updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                        }}/>
                                      </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
                                      <div className={`flex items-center bg-white/60 rounded-xl px-3 border-2 border-white transition-all ${cSched.ring} shadow-sm`}>
                                        <Globe size={16} className={`${cSched.text} mr-2 flex-shrink-0 opacity-70`} />
                                        <input type="text" placeholder="情報用URL (https://...)" className={`w-full bg-transparent outline-none py-2.5 text-sm ${cSched.text} font-bold placeholder-stone-300`} value={item.infoLink || ''} onChange={(e) => {
                                          const newSchedules = [...currentTrip.schedules[activeDay]]; newSchedules[index].infoLink = e.target.value; updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                        }}/>
                                      </div>
                                      <div className={`flex items-center bg-white/60 rounded-xl px-3 border-2 border-white transition-all ${cSched.ring} shadow-sm`}>
                                        <Tag size={16} className={`${cSched.text} mr-2 flex-shrink-0 opacity-70`} />
                                        <input type="text" placeholder="URLの表示名 (例: 公式サイト)" className="w-full bg-transparent outline-none py-2.5 text-sm text-stone-600 font-bold placeholder-stone-300" value={item.infoLinkLabel || ''} onChange={(e) => {
                                          const newSchedules = [...currentTrip.schedules[activeDay]]; newSchedules[index].infoLinkLabel = e.target.value; updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                        }}/>
                                      </div>
                                    </div>
                                    
                                    <div className={`flex items-start bg-white/60 rounded-xl px-3 border-2 border-white transition-all ${cSched.ring} shadow-sm`}>
                                      <AlignLeft size={16} className={`${cSched.text} mr-2 mt-3.5 flex-shrink-0 opacity-70`} />
                                      <textarea placeholder="メモ (チケット番号など)" className="w-full bg-transparent outline-none py-3 text-sm text-stone-600 font-bold resize-none h-16 leading-relaxed" value={item.memo} onChange={(e) => {
                                        const newSchedules = [...currentTrip.schedules[activeDay]]; newSchedules[index].memo = e.target.value; updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                      }}/>
                                    </div>

                                    <div className="flex items-start mt-4 pt-2">
                                      <div className="w-full flex gap-4 overflow-x-auto hide-scrollbar pb-4 px-2">
                                        {itemImages.map((img, imgIndex) => (
                                          <div key={imgIndex} className={`relative inline-block group/img transform ${imgIndex % 2 === 0 ? '-rotate-3' : 'rotate-3'} hover:rotate-0 hover:scale-105 transition-all duration-300 flex-shrink-0`}>
                                            <div className="bg-white p-2 pb-7 rounded-lg shadow-md border border-stone-200">
                                              <img src={img} alt="添付画像" onClick={() => setViewerData({ isOpen: true, images: itemImages, currentIndex: imgIndex })} className="h-24 w-auto max-w-[50vw] sm:max-w-[60vw] rounded object-contain cursor-pointer active:opacity-70 transition-opacity bg-stone-50" />
                                            </div>
                                            <button onClick={() => {
                                                const newSchedules = [...currentTrip.schedules[activeDay]];
                                                newSchedules[index].images = itemImages.filter((_, i) => i !== imgIndex); updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                              }} className="absolute -top-3 -right-3 bg-stone-800/80 backdrop-blur text-white rounded-full p-1.5 shadow-lg hover:bg-rose-500 transition-colors opacity-100 sm:opacity-0 sm:group-hover/img:opacity-100 z-30"><X size={12} /></button>
                                          </div>
                                        ))}
                                        {itemImages.length < 3 && (
                                          <div className={`relative inline-block transform ${itemImages.length % 2 === 0 ? '-rotate-3' : 'rotate-3'} hover:rotate-0 hover:scale-105 transition-all duration-300 flex-shrink-0`}>
                                            <label className={`cursor-pointer bg-white/80 p-2 pb-7 rounded-lg shadow-md border-2 border-dashed ${cSched.borderMain} flex flex-col items-center justify-center h-[134px] w-[90px] ${cSched.text} opacity-80 hover:opacity-100 ${cSched.bgLight} transition-all`}>
                                              <ImageIcon size={24} className="mb-1 drop-shadow-sm" />
                                              <span className="text-[10px] font-black">写真追加</span>
                                              <input type="file" accept="image/*" className="hidden" onChange={async (e) => {
                                                  const file = e.target.files[0];
                                                  if (file) {
                                                    try {
                                                      const base64Img = await compressImage(file);
                                                      const newSchedules = [...currentTrip.schedules[activeDay]];
                                                      newSchedules[index].images = [...itemImages, base64Img]; updateSchedules({ ...currentTrip.schedules, [activeDay]: newSchedules });
                                                    } catch (err) { showAlert('画像の読み込みに失敗しました'); }
                                                  }
                                                }} />
                                            </label>
                                          </div>
                                        )}
                                      </div>
                                    </div>
                                  </div>
                                </div>
                            </div>
                          );
                        })}
                      </div>
                   </div>

                   <button onClick={() => handleAddSchedule(activeDay)} className={`w-full py-5 border-[3px] border-dashed ${cSched.borderLight} ${cSched.text} rounded-3xl flex items-center justify-center ${cSched.bgLight} hover:bg-white transition-all font-black text-base mt-2 shadow-sm`}>
                     <Plus size={22} className="mr-2" /> 新しい予定を追加
                   </button>
                 </div>
              </div>

              {/* Items & Budget */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <Accordion title="持ち物リスト" icon={Briefcase} themeColorName={currentTheme.sections.items} rightAction={
                    <button onClick={() => updateItems([...currentTrip.items, { id: generateId(), name: '', checked: false }])} className={`${cItem.text} p-1.5 ${cItem.bgLight} rounded-full ${cItem.bgHover} hover:text-white transition-colors border border-white shadow-sm`}><Plus size={18} /></button>
                  }>
                  <div className="space-y-3">
                    {currentTrip.items.map((item, index) => (
                      <div key={item.id} className="flex items-center group bg-white/60 rounded-2xl p-2 px-3 border-2 border-white shadow-sm">
                        <button className={`mr-3 transition-colors ${item.checked ? cItem.text : 'text-stone-300 hover:text-stone-400'}`} onClick={() => {
                            const newItems = [...currentTrip.items]; newItems[index].checked = !newItems[index].checked; updateItems(newItems);
                          }}>
                          {item.checked ? <CheckCircle2 size={22} /> : <Circle size={22} />}
                        </button>
                        <input type="text" className={`flex-1 outline-none bg-transparent py-1 font-bold ${item.checked ? 'line-through text-stone-300' : 'text-stone-700'}`} value={item.name} placeholder="持ち物を入力" onChange={(e) => {
                            const newItems = [...currentTrip.items]; newItems[index].name = e.target.value; updateItems(newItems);
                          }}/>
                        <button className="text-stone-300 hover:text-rose-400 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 p-1 transition-all" onClick={() => updateItems(currentTrip.items.filter((_, i) => i !== index))}><Trash2 size={16} /></button>
                      </div>
                    ))}
                    {currentTrip.items.length === 0 && <p className="text-sm text-stone-400 text-center py-4 font-bold">持ち物を追加しましょう</p>}
                  </div>
                </Accordion>

                <Accordion title="予算" icon={DollarSign} themeColorName={currentTheme.sections.budget} rightAction={
                    <button onClick={() => updateBudgets([...currentTrip.budgets, { id: generateId(), name: '', amount: '' }])} className={`${cBudget.text} p-1.5 ${cBudget.bgLight} rounded-full ${cBudget.bgHover} hover:text-white transition-colors border border-white shadow-sm`}><Plus size={18} /></button>
                  }>
                  <div className="space-y-3 mb-5">
                    {currentTrip.budgets.map((budget, index) => (
                      <div key={budget.id} className="flex items-center gap-2 group">
                        <input type="text" className={`flex-1 outline-none bg-white/60 rounded-2xl px-3 py-2.5 text-sm font-bold border-2 border-white transition-all ${cBudget.ring} shadow-sm`} value={budget.name} placeholder="項目 (例: 交通費)" onChange={(e) => {
                            const newBudgets = [...currentTrip.budgets]; newBudgets[index].name = e.target.value; updateBudgets(newBudgets);
                          }}/>
                        <div className="relative w-32">
                          <span className={`absolute left-3 top-2.5 ${cBudget.text} opacity-70 text-sm font-bold`}>¥</span>
                          <input type="number" className={`w-full outline-none bg-white/60 rounded-2xl pl-7 pr-3 py-2.5 text-sm font-bold border-2 border-white text-right transition-all text-stone-700 ${cBudget.ring} shadow-sm`} value={budget.amount} placeholder="0" onChange={(e) => {
                              const newBudgets = [...currentTrip.budgets]; newBudgets[index].amount = e.target.value; updateBudgets(newBudgets);
                            }}/>
                        </div>
                        <button className="text-stone-300 hover:text-rose-400 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 p-1.5 transition-all" onClick={() => updateBudgets(currentTrip.budgets.filter((_, i) => i !== index))}><Trash2 size={18} /></button>
                      </div>
                    ))}
                  </div>
                  <div className={`flex justify-between items-center p-4 ${cBudget.bgLight} border-2 border-white ${cBudget.text} rounded-2xl font-black text-lg shadow-sm`}>
                    <span>合計予算</span><span>¥{totalBudget.toLocaleString()}</span>
                  </div>
                </Accordion>
              </div>
            </div>
          </div>

          <FullScreenImageViewer viewerData={viewerData} setViewerData={setViewerData} />
        </div>
      );
    };

    const TripViewer = ({ currentTrip, setView, setCurrentTripId, handleSaveAsTemplate, updateCurrentTrip, currentTheme }) => {
      const [currentTime, setCurrentTime] = useState(new Date());
      const [dogPositions, setDogPositions] = useState({});
      const [footprintPositions, setFootprintPositions] = useState({});
      const [viewerData, setViewerData] = useState({ isOpen: false, images: [], currentIndex: 0 });
      
      const cMain = colorClasses[currentTheme.primary];
      const cInfo = colorClasses[currentTheme.sections.info];
      const cMemo = colorClasses[currentTheme.sections.memo];
      const cSched = colorClasses[currentTheme.sections.schedule];
      const cItem = colorClasses[currentTheme.sections.items];
      const cBudget = colorClasses[currentTheme.sections.budget];

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      if (!currentTrip) return null;
      const daysCount = calculateDays(currentTrip.startDate, currentTrip.endDate) || 1;
      const totalBudget = currentTrip.budgets.reduce((sum, b) => sum + (Number(b.amount) || 0), 0);

      const currentDayIndex = useMemo(() => {
        if (!currentTrip?.startDate) return null;
        const start = new Date(currentTrip.startDate); start.setHours(0, 0, 0, 0);
        const today = new Date(currentTime); today.setHours(0, 0, 0, 0);
        return Math.floor((today.getTime() - start.getTime()) / (1000 * 60 * 60 * 24)) + 1;
      }, [currentTrip?.startDate, currentTime]);

      const currentMinutes = currentTime.getHours() * 60 + currentTime.getMinutes() + currentTime.getSeconds() / 60;

      useEffect(() => {
        if (!currentTrip) return;
        const newPositions = {};
        const newFootprints = {};
        
        Object.keys(currentTrip.schedules).forEach(dayStr => {
          if (currentDayIndex === parseInt(dayStr)) {
            const schedules = currentTrip.schedules[dayStr] || [];
            if (schedules.length === 0) return;
            const container = document.getElementById(`timeline-${dayStr}`);
            if (!container) return;
            const sorted = [...schedules].sort((a, b) => timeToMinutes(a.time) - timeToMinutes(b.time));
            const firstTime = timeToMinutes(sorted[0].time);
            const lastTime = timeToMinutes(sorted[sorted.length - 1].time);
            
            const getTimeCenterY = (id) => {
              const el = document.getElementById(`time-${id}`);
              if (el) return (el.getBoundingClientRect().top - container.getBoundingClientRect().top) + (el.getBoundingClientRect().height / 2);
              return 0;
            };
            
            let currentY = 0;
            const firstY = getTimeCenterY(sorted[0].id);

            if (sorted.length === 1 || currentMinutes <= firstTime) {
                currentY = firstY;
            } else if (currentMinutes >= lastTime) {
                currentY = getTimeCenterY(sorted[sorted.length - 1].id);
            } else {
              for (let j = 0; j < sorted.length - 1; j++) {
                const t1 = timeToMinutes(sorted[j].time); const t2 = timeToMinutes(sorted[j + 1].time);
                if (currentMinutes >= t1 && currentMinutes <= t2) {
                  const top1 = getTimeCenterY(sorted[j].id); const top2 = getTimeCenterY(sorted[j + 1].id);
                  currentY = top1 + (top2 - top1) * (t2 === t1 ? 0 : (currentMinutes - t1) / (t2 - t1)); break;
                }
              }
            }
            newPositions[dayStr] = currentY;

            const footprints = [];
            const step = 25; 
            for (let y = firstY + step; y < currentY - 15; y += step) {
               footprints.push(y);
            }
            newFootprints[dayStr] = footprints;
          }
        });
        setDogPositions(newPositions);
        setFootprintPositions(newFootprints);
      }, [currentTime, currentTrip, currentDayIndex, currentMinutes]);

      return (
        <div className="min-h-screen animate-in fade-in duration-300 pb-24 print:pb-0 relative print-transparent-bg z-10 overflow-x-hidden">
          <div className="sticky top-0 z-40 bg-white/70 backdrop-blur-xl border-b border-white/50 shadow-sm no-print">
            <div className="flex items-center justify-between py-2 px-4 max-w-3xl mx-auto">
              <button onClick={() => { setView('home'); setCurrentTripId(null); }} className="text-stone-600 flex items-center font-bold bg-white/80 px-3 py-1 text-sm rounded-full hover:bg-white transition-colors shadow-sm border border-stone-100">
                <ChevronLeft size={16} className="mr-1" /> 戻る
              </button>
              <div className="flex space-x-2">
                <button onClick={() => setView('edit')} className={`text-white ${cMain.bgMain} ${cMain.bgHover} px-4 py-1 text-sm rounded-full font-bold transition-colors shadow-md ${cMain.shadowLight} border border-white/20`}>
                  編集
                </button>
                <button onClick={() => window.print()} className="text-stone-600 bg-white/80 p-1.5 rounded-full hover:bg-white shadow-sm border border-stone-100"><Printer size={16} /></button>
                <button onClick={() => handleSaveAsTemplate(currentTrip)} className="text-stone-600 bg-white/80 p-1.5 rounded-full hover:bg-white shadow-sm border border-stone-100" title="テンプレートとして保存"><Copy size={16} /></button>
              </div>
            </div>
          </div>

          <div className="w-full relative">
            <div className="max-w-3xl mx-auto mb-10 px-6 print:mt-8 pt-8">
              <div className="text-center relative">
                <h1 className="text-4xl font-black text-stone-700 tracking-tight mb-3 leading-tight whitespace-pre-wrap relative z-10">{currentTrip.title || '無題の旅行'}</h1>
                {currentTrip.subtitle && <p className="text-xl text-stone-500 mb-6 font-bold whitespace-pre-wrap relative z-10">{currentTrip.subtitle}</p>}
              </div>
              
              <div className={`flex flex-col sm:flex-row sm:flex-wrap items-start sm:items-center justify-start gap-3 text-sm font-bold text-stone-600 bg-white/80 backdrop-blur-md print:border-gray-300 rounded-[2rem] p-5 shadow-sm border-2 sm:border-4 border-dashed ${cInfo.borderLight} text-left relative`}>
                {currentTrip.destination && <div className="flex items-center px-3 py-1.5 bg-white/80 rounded-full shadow-sm border border-white"><MapPin size={16} className={`mr-1.5 flex-shrink-0 ${cInfo.text}`} /> <span>{currentTrip.destination}</span></div>}
                {(currentTrip.startDate || currentTrip.endDate) && <div className="flex items-center px-3 py-1.5 bg-white/80 rounded-full shadow-sm border border-white"><Calendar size={16} className={`mr-1.5 flex-shrink-0 ${cInfo.text}`} /> <span>{formatDate(currentTrip.startDate)} {currentTrip.endDate && `〜 ${formatDate(currentTrip.endDate)}`}</span></div>}
                {currentTrip.members.length > 0 && <div className="flex items-center px-3 py-1.5 bg-white/80 rounded-full shadow-sm border border-white"><Users size={16} className={`mr-1.5 flex-shrink-0 ${cInfo.text}`} /> <span>{currentTrip.members.join(', ')}</span></div>}
              </div>
            </div>

            {/* Cover Image in Viewer - Full Width */}
            {currentTrip.coverImage && (
              <div className={`w-full mb-10 ${cMain.bgLight} flex justify-center border-y-4 border-white shadow-sm relative`}>
                <img src={currentTrip.coverImage} alt="Cover" className="w-full max-w-3xl h-auto object-contain cursor-pointer hover:opacity-90 transition-opacity" onClick={() => setViewerData({ isOpen: true, images: [currentTrip.coverImage], currentIndex: 0 })} />
              </div>
            )}

            <div className="max-w-3xl mx-auto px-4 sm:px-6 w-full">
              {currentTrip.memo && (
                 <div className={`relative mb-12 p-6 sm:p-8 ${cMemo.bgLight} bg-opacity-70 backdrop-blur-sm rounded-[2rem] border-2 sm:border-4 border-dashed ${cMemo.borderMain} flex flex-col items-center shadow-sm`}>
                   <h3 className={`text-sm font-black ${cMemo.text} uppercase tracking-widest mb-4 flex items-center justify-center relative z-10`}><FileText size={18} className="mr-2"/> 全体メモ</h3>
                   <div className="text-stone-700 leading-relaxed font-bold text-base w-full max-w-full relative z-10">
                     {currentTrip.memo.split('\n').map((line, i) => (
                       <div key={i} className="text-center min-h-[1.5rem] break-words">
                         {line}
                       </div>
                     ))}
                   </div>
                 </div>
              )}

              <div className="mb-12">
                <div className="flex items-center justify-between mb-8 pl-2">
                  <h2 className="text-2xl font-black text-stone-700 flex items-center tracking-tight"><Clock className={`mr-2.5 ${cSched.text}`} size={28} /> 旅のスケジュール</h2>
                </div>
                
                <div className="space-y-12 w-full max-w-full overflow-hidden">
                  {Array.from({ length: daysCount }).map((_, i) => {
                    const dayStr = String(i + 1);
                    const schedules = currentTrip.schedules[dayStr] || [];
                    if (schedules.length === 0) return null;
                    const dateStr = currentTrip.startDate ? formatDate(new Date(new Date(currentTrip.startDate).setDate(new Date(currentTrip.startDate).getDate() + i))) : '';
                    const isToday = currentDayIndex === parseInt(dayStr);

                    return (
                      <div key={dayStr} className="print-card print:mb-6 w-full max-w-full overflow-hidden">
                        <div className="flex items-baseline mb-6 pl-2">
                          <h3 className="text-2xl font-black text-stone-700 mr-3">Day {dayStr}</h3>
                          <span className="text-base font-bold text-stone-400">{dateStr}</span>
                          {isToday && <span className={`ml-4 text-xs ${cSched.bgMain} text-white px-3 py-1.5 rounded-full font-bold animate-pulse shadow-md ${cSched.shadowLight} border border-white/20 no-print`}>Today</span>}
                        </div>
                        
                        <div id={`timeline-${dayStr}`} className="relative pb-6 w-full max-w-full overflow-hidden">
                          <div className={`absolute top-2 bottom-0 left-[16px] w-2 ${cSched.bgLight} z-0 rounded-full border border-white`}></div>

                          {/* 足跡 🐾 */}
                          {isToday && footprintPositions[dayStr] && footprintPositions[dayStr].map((y, idx) => (
                            <div 
                              key={`footprint-${idx}`}
                              className="absolute z-10 no-print flex items-center justify-center pointer-events-none opacity-60 animate-in fade-in duration-500 text-stone-400" 
                              style={{ 
                                top: `${y}px`, 
                                left: idx % 2 === 0 ? '11px' : '23px',
                                transform: `translateY(-50%) rotate(${idx % 2 === 0 ? '-20deg' : '20deg'})`,
                                fontSize: '10px'
                              }}
                            >
                              🐾
                            </div>
                          ))}

                          {/* 現在地アイコン（犬） */}
                          {isToday && dogPositions[dayStr] !== undefined && (
                            <div className="absolute z-20 no-print flex items-center justify-center pointer-events-none transition-all duration-1000 ease-linear left-[3px]" style={{ top: `${dogPositions[dayStr]}px`, transform: 'translateY(-50%)' }}>
                              <div className={`bg-white rounded-full shadow-lg border-[3px] ${cSched.borderLight} text-xl w-9 h-9 flex items-center justify-center filter drop-shadow-md`}>🐕</div>
                            </div>
                          )}

                          <div className="space-y-8 w-full max-w-full mt-2">
                            {schedules.map((item) => {
                              const itemImages = item.images || (item.image ? [item.image] : []);
                              return (
                                <div key={item.id} id={`card-${item.id}`} className="relative z-10 pl-[36px] sm:pl-[44px] w-full max-w-full pr-0 pt-6">
                                  
                                  <div className="relative w-full">
                                    {/* 時刻バッジ（左上枠外） */}
                                    <div id={`time-${item.id}`} className={`absolute -top-5 left-0 ${cSched.bgMain} text-white px-4 py-1.5 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.1)] z-20 font-black text-sm tracking-widest border-2 border-white flex items-center transform -rotate-2`}>
                                      <Clock size={14} className="mr-1.5 opacity-90" />
                                      {item.time || '--:--'}
                                    </div>
                                    
                                    {/* カード本体 */}
                                    <div className={`w-full bg-white/90 backdrop-blur-sm print:bg-transparent rounded-[2rem] p-4 sm:p-5 pt-7 sm:pt-8 shadow-sm print:shadow-none border-2 sm:border-4 border-dashed ${cSched.borderLight} print:border-none print:p-0 relative overflow-hidden group hover:shadow-md transition-all`}>
                                      <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${cSched.bgLight}`}></div>
                                      <h4 className="text-xl font-extrabold text-stone-700 tracking-tight leading-snug break-words w-full mb-3">{item.content || '予定なし'}</h4>
                                      
                                      <div className="flex flex-wrap gap-2 mb-2 w-full">
                                        {item.location && (
                                          <span className={`inline-flex items-center px-3 py-1.5 bg-white/80 rounded-full text-sm font-bold border border-white shadow-sm break-words max-w-full`}>
                                            <MapPin size={14} className={`mr-1.5 ${cSched.text} flex-shrink-0`} /> <span className="truncate text-stone-600">{item.location}</span>
                                          </span>
                                        )}
                                        {item.mapLink && (
                                          <a href={item.mapLink} target="_blank" rel="noreferrer" className={`inline-flex items-center px-3 py-1.5 bg-blue-50 text-blue-500 rounded-xl text-sm font-bold hover:bg-blue-50 transition-colors border border-white shadow-sm no-print flex-shrink-0`}>
                                            <LinkIcon size={14} className="mr-1.5 text-blue-400" /> Map
                                          </a>
                                        )}
                                        {item.infoLink && (
                                          <a href={item.infoLink} target="_blank" rel="noreferrer" className={`inline-flex items-center px-3 py-1.5 ${cSched.bgLight} rounded-full text-sm font-bold ${cSched.bgHover} hover:text-white transition-colors border border-white shadow-sm no-print max-w-full break-words`}>
                                            <Globe size={14} className={`mr-1.5 flex-shrink-0 ${cSched.text} group-hover:text-white transition-colors`} />
                                            <span className={`truncate ${cSched.text} group-hover:text-white transition-colors`}>{item.infoLinkLabel || '参考リンク'}</span>
                                          </a>
                                        )}
                                      </div>
                                      
                                      {item.memo && (
                                        <div className="mt-4 relative pl-4 py-1 text-sm text-stone-500 whitespace-pre-wrap leading-relaxed font-bold break-words w-full">
                                          <div className={`absolute left-0 top-0 bottom-0 w-1 ${cSched.bgMedium} rounded-full`}></div>
                                          {item.memo}
                                        </div>
                                      )}
                                      
                                      {itemImages.length > 0 && (
                                        <div className="mt-5 flex gap-4 overflow-x-auto hide-scrollbar pb-4 px-2 no-print w-full max-w-full">
                                          {itemImages.map((img, imgIndex) => (
                                            <div key={imgIndex} className={`relative inline-block transform ${imgIndex % 2 === 0 ? '-rotate-3' : 'rotate-3'} hover:rotate-0 hover:scale-105 transition-all duration-300 flex-shrink-0`}>
                                              <div className="bg-white p-2 pb-7 rounded-lg shadow-md border border-stone-200">
                                                <img src={img} alt="添付画像" onClick={() => setViewerData({ isOpen: true, images: itemImages, currentIndex: imgIndex })} className="h-24 w-auto max-w-[50vw] sm:max-w-[60vw] rounded object-contain cursor-pointer active:opacity-70 transition-opacity bg-stone-50" />
                                              </div>
                                            </div>
                                          ))}
                                        </div>
                                      )}
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-8 page-break">
                {currentTrip.items.length > 0 && (
                  <Accordion title="持ち物リスト" icon={Briefcase} themeColorName={currentTheme.sections.items} defaultOpen={true} isPrintable={true} className="mb-0 h-fit">
                    <ul className="space-y-3.5">
                      {currentTrip.items.map((item, index) => (
                        <li key={item.id} className="flex items-center text-stone-700 font-bold group cursor-pointer" onClick={() => {
                          const newItems = [...currentTrip.items]; newItems[index].checked = !newItems[index].checked; updateCurrentTrip({ items: newItems });
                        }}>
                          <button className={`w-6 h-6 rounded-md border-[3px] border-stone-200 mr-3 flex items-center justify-center print:border-gray-800 transition-colors bg-white flex-shrink-0 shadow-sm ${item.checked ? cItem.borderMain : ''}`}>
                            {item.checked && <CheckCircle2 size={18} className={`${cItem.text} no-print`} />}
                          </button>
                          <span className={`transition-all break-words w-full ${item.checked ? 'line-through text-stone-300' : ''}`}>{item.name || '名称未設定'}</span>
                        </li>
                      ))}
                    </ul>
                  </Accordion>
                )}

                {currentTrip.budgets.length > 0 && (
                  <Accordion title="予算・費用" icon={DollarSign} themeColorName={currentTheme.sections.budget} defaultOpen={true} isPrintable={true} className="mb-0 h-fit">
                    <div className="space-y-4 mb-5">
                      {currentTrip.budgets.map(budget => (
