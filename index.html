                        <div key={budget.id} className="flex justify-between items-center text-stone-600 font-bold border-b border-stone-100/50 pb-3">
                          <span className="truncate pr-2">{budget.name || '項目未定'}</span>
                          <span className="text-stone-700 flex-shrink-0">¥{Number(budget.amount || 0).toLocaleString()}</span>
                        </div>
                      ))}
                    </div>
                    <div className={`flex justify-between items-center pt-2 text-lg font-black ${cBudget.text} bg-white/60 p-4 rounded-2xl border-2 border-white shadow-sm`}>
                      <span>合計</span><span>¥{totalBudget.toLocaleString()}</span>
                    </div>
                  </Accordion>
                )}
              </div>
            </div>
          </div>

          <FullScreenImageViewer viewerData={viewerData} setViewerData={setViewerData} />
        </div>
      );
    };

    const SettingsView = ({ trips, setTrips, currentThemeId, setCurrentThemeId, currentTheme, showAlert }) => {
      const cMain = colorClasses[currentTheme.primary];
      return (
        <div className="pb-24 pt-8 px-4 max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500 relative z-10">
          <div className="mb-10 pl-2 pt-2 text-center">
            <div className={`inline-flex items-center justify-center px-3 py-1.5 mb-3 ${cMain.bgLight} rounded-full shadow-sm border border-white/80 backdrop-blur-sm`}>
              <Settings size={14} className={`mr-1.5 ${cMain.text}`} />
              <span className={`text-[10px] font-black tracking-widest uppercase ${cMain.text}`}>Settings</span>
            </div>
            <h1 className="text-3xl font-black tracking-tight text-stone-700 drop-shadow-sm">設定・データ</h1>
          </div>
          
          <div className="bg-white/90 backdrop-blur-sm rounded-[2rem] shadow-sm border-2 sm:border-4 border-dashed border-stone-200/50 overflow-hidden mb-6">
            <div className={`p-5 border-b-2 border-dashed border-stone-200/50 ${cMain.bgLight} font-bold text-stone-700 flex items-center text-lg`}>
              <Palette size={20} className={`mr-2 ${cMain.text}`}/> テーマカラー
            </div>
            <div className="p-6">
              <div className="grid grid-cols-5 gap-3">
                {Object.values(THEMES).map(t => (
                  <button key={t.id} onClick={() => setCurrentThemeId(t.id)} className="flex flex-col items-center justify-center space-y-2 group">
                    <div className={`w-12 h-12 sm:w-14 sm:h-14 rounded-full border-[3px] transition-all flex items-center justify-center shadow-sm ${currentThemeId === t.id ? `${colorClasses[t.primary].borderMain} scale-110 shadow-md` : 'border-white group-hover:scale-105 group-hover:border-stone-100'}`} style={{ backgroundColor: t.bgHex }}>
                      <div className={`w-8 h-8 sm:w-10 sm:h-10 rounded-full ${colorClasses[t.primary].bgMain} shadow-inner`}></div>
                    </div>
                    <span className={`text-[10px] sm:text-xs font-bold ${currentThemeId === t.id ? colorClasses[t.primary].text : 'text-stone-400'}`}>{t.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="bg-white/90 backdrop-blur-sm rounded-[2rem] shadow-sm border-2 sm:border-4 border-dashed border-stone-200/50 overflow-hidden mb-6">
            <div className="p-5 border-b-2 border-dashed border-stone-200/50 bg-stone-50/50 font-bold text-stone-700 flex items-center text-lg">
              <Download size={20} className={`mr-2 ${cMain.text}`}/> データ管理 (JSON)
            </div>
            <div className="p-6 space-y-4">
              <p className="text-sm text-stone-500 leading-relaxed font-bold">しおりのデータをJSON形式でエクスポート・インポートできます。</p>
              <div className="flex gap-4 pt-2">
                <button onClick={() => {
                    const jsonStr = JSON.stringify(trips);
                    const blob = new Blob([jsonStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = "journey_backup.json";
                    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
                  }} className={`flex-1 ${cMain.bgMain} text-white py-3.5 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-transform shadow-md ${cMain.shadowLight} ${cMain.bgHover} border-2 border-white`}>
                  <Download size={18} className="mr-2" /> 保存
                </button>
                <label className={`flex-1 ${cMain.bgLight} ${cMain.text} py-3.5 rounded-xl font-bold flex items-center justify-center cursor-pointer active:scale-95 transition-transform ${cMain.bgMedium} border-2 border-white shadow-sm`}>
                  <Upload size={18} className="mr-2" /> 読込
                  <input type="file" accept=".json" className="hidden" onChange={(e) => {
                      const file = e.target.files[0]; if (!file) return;
                      const reader = new FileReader();
                      reader.onload = (event) => {
                        try {
                          const imported = JSON.parse(event.target.result);
                          if (Array.isArray(imported)) { setTrips(imported); showAlert('インポートしました'); } else showAlert('不正なデータです');
                        } catch(err) { showAlert('エラー: ' + err.message); }
                      };
                      reader.readAsText(file);
                    }}/>
                </label>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const TabBar = ({ view, setView, currentTheme, handleCreate }) => {
      if (view === 'edit' || view === 'view') return null;
      const cMain = colorClasses[currentTheme.primary];
      return (
        <div className="fixed bottom-0 left-0 w-full z-50 px-4 pb-6 pt-2 pointer-events-none no-print">
          <div className="max-w-md mx-auto bg-white/80 backdrop-blur-xl border-2 border-white rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.08)] flex justify-around items-center p-2 pointer-events-auto">
            <button onClick={() => setView('home')} className={`p-2 rounded-full flex flex-col items-center justify-center w-16 transition-colors ${view === 'home' ? cMain.text : 'text-stone-400 hover:bg-stone-50'}`}>
              <Home size={24} className={view === 'home' ? 'fill-current' : ''} />
              <span className="text-[10px] mt-1 font-bold">ホーム</span>
            </button>
            
            <button onClick={() => handleCreate()} className={`rounded-full flex flex-col items-center justify-center transition-transform active:scale-95 group`}>
              <div className={`flex items-center justify-center w-12 h-12 rounded-full ${cMain.bgMain} text-white shadow-md ${cMain.shadowLight} ${cMain.bgHover} border-2 border-white`}>
                <Plus size={24} strokeWidth={3} />
              </div>
            </button>

            <button onClick={() => setView('templates')} className={`p-2 rounded-full flex flex-col items-center justify-center w-16 transition-colors ${view === 'templates' ? cMain.text : 'text-stone-400 hover:bg-stone-50'}`}>
              <Copy size={24} className={view === 'templates' ? 'fill-current' : ''} />
              <span className="text-[10px] mt-1 font-bold">テンプレ</span>
            </button>
            
            <button onClick={() => setView('settings')} className={`p-2 rounded-full flex flex-col items-center justify-center w-16 transition-colors ${view === 'settings' ? cMain.text : 'text-stone-400 hover:bg-stone-50'}`}>
              <Settings size={24} className={view === 'settings' ? 'fill-current' : ''} />
              <span className="text-[10px] mt-1 font-bold">設定</span>
            </button>
          </div>
        </div>
      );
    };

    // --- App Main ---
    function App() {
      const [trips, setTrips] = useState([]);
      const [view, setView] = useState('home');
      const [currentTripId, setCurrentTripId] = useState(null);
      const [currentThemeId, setCurrentThemeId] = useState('sakura');
      const [isLoaded, setIsLoaded] = useState(false);
      
      const [modalConfig, setModalConfig] = useState({ isOpen: false, message: '', onConfirm: null, isAlert: false });

      const showAlert = useCallback((message) => {
        setModalConfig({
          isOpen: true,
          message,
          isAlert: true,
          onConfirm: () => setModalConfig({ isOpen: false, message: '', onConfirm: null, isAlert: false })
        });
      }, []);

      const showConfirm = useCallback((message, onConfirmAction) => {
        setModalConfig({
          isOpen: true,
          message,
          isAlert: false,
          onConfirm: () => {
            onConfirmAction();
            setModalConfig({ isOpen: false, message: '', onConfirm: null, isAlert: false });
          }
        });
      }, []);

      useEffect(() => {
        const loadData = async () => {
          try {
            // LocalForageからデータを取得
            let savedTrips = await localforage.getItem('journey_trips');
            let savedTheme = await localforage.getItem('journey_theme');

            // 過去のlocalStorageのデータがある場合はマイグレーション（引き継ぎ）する
            if (!savedTrips) {
                const oldTrips = localStorage.getItem('journey_trips');
                if (oldTrips) {
                    savedTrips = JSON.parse(oldTrips);
                    await localforage.setItem('journey_trips', savedTrips);
                }
            }
            if (!savedTheme) {
                const oldTheme = localStorage.getItem('journey_theme');
                if (oldTheme) {
                    savedTheme = oldTheme;
                    await localforage.setItem('journey_theme', savedTheme);
                }
            }

            if (savedTrips) setTrips(savedTrips);
            else setTrips([initialTemplate]);
            
            if (savedTheme && THEMES[savedTheme]) setCurrentThemeId(savedTheme);
            
            setIsLoaded(true);
          } catch (e) {
            console.error("データの読み込みに失敗しました", e);
            setTrips([initialTemplate]);
            setIsLoaded(true);
          }
        };
        loadData();
      }, []);

      useEffect(() => {
        if (isLoaded) {
          const saveData = async () => {
            try {
              await localforage.setItem('journey_trips', trips);
              await localforage.setItem('journey_theme', currentThemeId);
            } catch (e) {
              console.error(e); 
              showAlert('保存容量の上限に達しました。不要な画像を削除してください。');
            }
          };
          saveData();
        }
      }, [trips, currentThemeId, isLoaded, showAlert]);

      const currentTheme = THEMES[currentThemeId];
      const cMain = colorClasses[currentTheme.primary];

      useEffect(() => {
        document.documentElement.style.setProperty('--app-bg', currentTheme.bgHex);
        document.documentElement.style.setProperty('--pattern-color', currentTheme.patternColor);
        const metaThemeColor = document.getElementById('meta-theme-color');
        if (metaThemeColor) metaThemeColor.setAttribute('content', currentTheme.bgHex);
      }, [currentTheme]);

      const activeTrips = useMemo(() => trips.filter(t => !t.isTemplate).sort((a, b) => b.updatedAt - a.updatedAt), [trips]);
      const templates = useMemo(() => trips.filter(t => t.isTemplate).sort((a, b) => b.updatedAt - a.updatedAt), [trips]);
      const currentTrip = useMemo(() => trips.find(t => t.id === currentTripId), [trips, currentTripId]);

      const updateCurrentTrip = (updates) => {
        setTrips(prev => prev.map(t => t.id === currentTripId ? { ...t, ...updates, updatedAt: Date.now() } : t));
      };

      const handleCreate = (template = null) => {
        const newTrip = template ? { ...template, id: generateId(), title: template.title, isTemplate: false, startDate: '', endDate: '' } : getEmptyTrip();
        setTrips([newTrip, ...trips]); setCurrentTripId(newTrip.id); setView('edit');
      };

      const handleSaveAsTemplate = (trip) => {
        const newTemplate = { ...trip, id: generateId(), isTemplate: true, title: trip.title + ' (テンプレート)' };
        setTrips([newTemplate, ...trips]); showAlert('テンプレートとして保存しました');
      };

      const handleDelete = (id) => {
        showConfirm('本当に削除しますか？', () => {
          setTrips(prev => {
            const newTrips = prev.filter(t => t.id !== id);
            return newTrips;
          });
          if (currentTripId === id) { 
            setView('home'); 
            setCurrentTripId(null); 
          }
        });
      };

      if (!isLoaded) return <div className="min-h-screen flex items-center justify-center text-stone-400">Loading...</div>;

      return (
        <div className={`min-h-screen relative selection:bg-stone-200 transition-colors duration-500 bg-gradient-to-br ${currentTheme.bgGradient} bg-cute-pattern`}>          
          {view === 'home' && <HomeView activeTrips={activeTrips} handleCreate={handleCreate} setCurrentTripId={setCurrentTripId} setView={setView} currentTheme={currentTheme} />}
          {view === 'templates' && <TemplatesView templates={templates} handleCreate={handleCreate} handleDelete={handleDelete} currentTheme={currentTheme} />}
          {view === 'edit' && <TripEditor currentTrip={currentTrip} updateCurrentTrip={updateCurrentTrip} handleDelete={handleDelete} setView={setView} currentTheme={currentTheme} showAlert={showAlert} />}
          {view === 'view' && <TripViewer currentTrip={currentTrip} setView={setView} setCurrentTripId={setCurrentTripId} handleSaveAsTemplate={handleSaveAsTemplate} updateCurrentTrip={updateCurrentTrip} currentTheme={currentTheme} />}
          {view === 'settings' && <SettingsView trips={trips} setTrips={setTrips} currentThemeId={currentThemeId} setCurrentThemeId={setCurrentThemeId} currentTheme={currentTheme} showAlert={showAlert} />}
          <TabBar view={view} setView={setView} currentTheme={currentTheme} handleCreate={handleCreate} />

          {/* Custom Modal */}
          {modalConfig.isOpen && (
            <div className="fixed inset-0 z-[200] bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-white/90 backdrop-blur-md rounded-3xl p-6 w-full max-w-sm shadow-xl text-center border-4 border-white">
                <p className="text-stone-700 font-black mb-6 whitespace-pre-wrap tracking-wide">{modalConfig.message}</p>
                <div className="flex gap-3 justify-center">
                  {!modalConfig.isAlert && (
                    <button onClick={() => setModalConfig({ isOpen: false, message: '', onConfirm: null, isAlert: false })} className="flex-1 bg-white border-2 border-stone-100 text-stone-500 font-bold py-3.5 rounded-2xl hover:bg-stone-50 transition-colors shadow-sm">
                      キャンセル
                    </button>
                  )}
                  <button onClick={() => { if(typeof modalConfig.onConfirm === 'function') modalConfig.onConfirm(); }} className={`flex-1 ${cMain.bgMain} text-white font-bold py-3.5 rounded-2xl ${cMain.bgHover} shadow-md ${cMain.shadowLight} transition-colors border-2 border-white`}>
                    OK
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
